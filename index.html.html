    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(prefix)) keys.push(k);
      }
      return keys;
    } catch (e) { return []; }
  },
  async del(key) {
    try { localStorage.removeItem(key); }
    catch (e) {}
  },
};

const encodeState = (state) => {
  try {
    const json = JSON.stringify(state);
    return btoa(unescape(encodeURIComponent(json)));
  } catch (e) { return ''; }
};
const decodeState = (s) => {
  try {
    return JSON.parse(decodeURIComponent(escape(atob(s))));
  } catch (e) { return null; }
};

function App() {
  const [route, setRoute] = useState('home');
  const [interventions, setInterventions] = useState(DEFAULT_INTERVENTIONS);
  const [ecoMeta, setEcoMeta] = useState({ name: '', definition: '', timeframe: '', completedBy: '', date: '' });
  const [ecoInputs, setEcoInputs] = useState({});
  const [portfolioInputs, setPortfolioInputs] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [toast, setToast] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);

  // Restore admin mode from session storage on mount
  useEffect(() => {
    try {
      if (sessionStorage.getItem('eco-portfolio:admin') === 'true') setIsAdmin(true);
    } catch (e) {}
  }, []);

  const enableAdmin = () => {
    const pw = prompt('Enter admin password to unlock the Interventions library for editing:');
    if (pw === null) return;
    if (pw === ADMIN_PASSWORD) {
      setIsAdmin(true);
      try { sessionStorage.setItem('eco-portfolio:admin', 'true'); } catch (e) {}
      showToast('Admin mode enabled — editing unlocked');
    } else {
      showToast('Incorrect password');
    }
  };

  const disableAdmin = () => {
    setIsAdmin(false);
    try { sessionStorage.removeItem('eco-portfolio:admin'); } catch (e) {}
    showToast('Admin mode locked');
  };

  useEffect(() => {
    (async () => {
      if (window.location.hash && window.location.hash.length > 5) {
        const hash = window.location.hash.replace(/^#s=/, '');
        const decoded = decodeState(hash);
        if (decoded) {
          if (decoded.interventions) setInterventions(decoded.interventions);
          if (decoded.ecoMeta) setEcoMeta(decoded.ecoMeta);
          if (decoded.ecoInputs) setEcoInputs(decoded.ecoInputs);
          if (decoded.portfolioInputs) setPortfolioInputs(decoded.portfolioInputs);
          setLoaded(true);
          showToast('Assessment loaded from shared link');
          return;
        }
      }
      const saved = await storage.get(STORAGE_KEY);
      if (saved) {
        try {
          const d = JSON.parse(saved);
          if (d.interventions) setInterventions(d.interventions);
          if (d.ecoMeta) setEcoMeta(d.ecoMeta);
          if (d.ecoInputs) setEcoInputs(d.ecoInputs);
          if (d.portfolioInputs) setPortfolioInputs(d.portfolioInputs);
        } catch (e) {}
      }
      setLoaded(true);
    })();
  }, []);

  const saveTimer = useRef(null);
  useEffect(() => {
    if (!loaded) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      const payload = JSON.stringify({ interventions, ecoMeta, ecoInputs, portfolioInputs });
      storage.set(STORAGE_KEY, payload);
    }, 600);
    return () => saveTimer.current && clearTimeout(saveTimer.current);
  }, [interventions, ecoMeta, ecoInputs, portfolioInputs, loaded]);

  const showToast = (msg, ms = 2400) => {
    setToast(msg);
    setTimeout(() => setToast(null), ms);
  };

  const updateEcoInput = useCallback((id, field, value) => {
    setEcoInputs(prev => ({ ...prev, [id]: { ...(prev[id] || {}), [field]: value } }));
  }, []);
  const updatePortfolioInput = useCallback((id, value) => {
    setPortfolioInputs(prev => ({ ...prev, [id]: { spend: value } }));
  }, []);

  const resetAll = async () => {
    if (!confirm('Reset everything — interventions, inputs, and saved state — back to defaults?')) return;
    setInterventions(DEFAULT_INTERVENTIONS);
    setEcoMeta({ name: '', definition: '', timeframe: '', completedBy: '', date: '' });
    setEcoInputs({});
    setPortfolioInputs({});
    await storage.del(STORAGE_KEY);
    window.location.hash = '';
    showToast('Reset complete');
  };

  const state = { interventions, ecoMeta, ecoInputs, portfolioInputs };

  return (
    <div style={{ background: T.bone, color: T.ink, minHeight: '100vh' }}>
      <a href="#main-content" className="skip-link"
        style={{
          position: 'absolute', left: -9999, top: 8, padding: '10px 16px',
          background: T.forest, color: T.bone, borderRadius: 6, fontSize: 13, fontWeight: 500, zIndex: 100,
        }}
        onFocus={(e) => { e.target.style.left = '8px'; }}
        onBlur={(e) => { e.target.style.left = '-9999px'; }}>
        Skip to main content
      </a>
      <Header route={route} setRoute={setRoute} state={state} showToast={showToast} resetAll={resetAll} isAdmin={isAdmin} enableAdmin={enableAdmin} disableAdmin={disableAdmin} />
      <main id="main-content" tabIndex={-1} className="max-w-6xl mx-auto px-5 sm:px-8 pb-24" style={{ outline: 'none' }}>
        {route === 'home'      && <Home setRoute={setRoute} state={state} />}
        {route === 'ecosystem' && <EcosystemFlow interventions={interventions} ecoMeta={ecoMeta} setEcoMeta={setEcoMeta} ecoInputs={ecoInputs} updateEcoInput={updateEcoInput} setRoute={setRoute} />}
        {route === 'portfolio' && <PortfolioFlow interventions={interventions} portfolioInputs={portfolioInputs} updatePortfolioInput={updatePortfolioInput} setRoute={setRoute} />}
        {route === 'library'   && <Library interventions={interventions} setInterventions={setInterventions} showToast={showToast} isAdmin={isAdmin} enableAdmin={enableAdmin} disableAdmin={disableAdmin} />}
        {route === 'guide'     && <Guide setRoute={setRoute} />}
      </main>
      <div aria-live="polite" aria-atomic="true" style={{ position: 'fixed', bottom: 0, left: 0, right: 0, pointerEvents: 'none', display: 'flex', justifyContent: 'center', zIndex: 50 }}>
        {toast && (
          <div className="fade-in" style={{ marginBottom: 24, background: T.forest, color: T.bone, padding: '10px 20px', borderRadius: 999, fontSize: 14, boxShadow: '0 8px 24px rgba(0,0,0,0.18)' }}>
            {toast}
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================================
function ShareDialog({ state, onClose, showToast, resetAll }) {
  const [snapName, setSnapName] = useState('');
  const [snapshots, setSnapshots] = useState([]);
  const [shareUrl, setShareUrl] = useState('');

  useEffect(() => {
    (async () => {
      const keys = await storage.list('snapshot:');
      setSnapshots(keys.map(k => k.replace('snapshot:', '')));
    })();
    const enc = encodeState(state);
    const base = window.location.href.split('#')[0];
    setShareUrl(`${base}#s=${enc}`);
  }, []);

  const saveSnapshot = async () => {
    if (!snapName.trim()) return;
    await storage.set(`snapshot:${snapName.trim()}`, JSON.stringify(state));
    const keys = await storage.list('snapshot:');
    setSnapshots(keys.map(k => k.replace('snapshot:', '')));
    setSnapName('');
    showToast('Snapshot saved');
  };

  const loadSnapshot = async (name) => {
    const v = await storage.get(`snapshot:${name}`);
    if (!v) return;
    await storage.set(STORAGE_KEY, v);
    window.location.reload();
  };

  const deleteSnapshot = async (name) => {
    if (!confirm(`Delete snapshot "${name}"?`)) return;
    await storage.del(`snapshot:${name}`);
    setSnapshots(s => s.filter(x => x !== name));
  };

  const copyUrl = async () => {
    try { await navigator.clipboard.writeText(shareUrl); showToast('Shareable link copied'); }
    catch (e) { showToast('Could not copy — select and copy manually'); }
  };

  const exportJson = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'ecosystem-portfolio-assessment.json'; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="fixed inset-0 fade-in" style={{ background: 'rgba(30, 38, 32, 0.45)', zIndex: 50 }} onClick={onClose}>
      <div className="max-w-2xl mx-auto mt-16 fade-up scroll-soft" style={{ background: T.bone, borderRadius: 12, maxHeight: '80vh', overflowY: 'auto' }} onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between p-6 pb-3">
          <h3 className="serif" style={{ fontSize: 22, fontWeight: 500 }}>Save, share, or export</h3>
          <button onClick={onClose} style={{ color: T.muted }} aria-label="Close dialog" title="Close"><X size={20} aria-hidden="true" /></button>
        </div>
        <div className="px-6 pb-6 space-y-6">
          <Section title="Shareable link" subtitle="Encodes the whole assessment in the URL. Useful for sending to a colleague or coming back later.">
            <div className="flex gap-2">
              <input readOnly value={shareUrl} className="flex-1 scroll-soft" style={inputStyle({ fontSize: 12, fontFamily: 'ui-monospace, monospace' })} />
              <button onClick={copyUrl} className="flex items-center gap-1.5" style={buttonStyle('primary')}><Copy size={14} /> Copy</button>
            </div>
          </Section>
          <Section title="Named snapshots" subtitle="Saved in this browser. Use snapshots to compare over time, or different scenarios.">
            <div className="flex gap-2 mb-3">
              <input value={snapName} onChange={e => setSnapName(e.target.value)} placeholder="e.g. Te Tai Tokerau, Nov 2025" className="flex-1" style={inputStyle()} />
              <button onClick={saveSnapshot} className="flex items-center gap-1.5" style={buttonStyle('primary')}><Save size={14} /> Save</button>
            </div>
            {snapshots.length === 0 ? (
              <p style={{ color: T.muted, fontSize: 13 }}>No snapshots yet.</p>
            ) : (
              <ul className="space-y-1">
                {snapshots.map(name => (
                  <li key={name} className="flex items-center justify-between gap-3" style={{ padding: '8px 10px', borderRadius: 6, background: T.boneLight, border: `1px solid ${T.hairSoft}` }}>
                    <span style={{ fontSize: 14 }}>{name}</span>
                    <div className="flex gap-1">
                      <button onClick={() => loadSnapshot(name)} style={buttonStyle('ghost', 'sm')}>Load</button>
                      <button onClick={() => deleteSnapshot(name)} style={{...buttonStyle('ghost', 'sm'), color: T.clayDark }}><Trash2 size={13} /></button>
                    </div>
                  </li>
                ))}
              </ul>
            )}
          </Section>
          <Section title="Export & reset">
            <div className="flex gap-2 flex-wrap">
              <button onClick={exportJson} className="flex items-center gap-1.5" style={buttonStyle('secondary')}><Download size={14} /> Export JSON</button>
              <button onClick={resetAll} className="flex items-center gap-1.5" style={{...buttonStyle('secondary'), color: T.clayDark, borderColor: T.clayDark + '33' }}><RotateCcw size={14} /> Reset everything</button>
            </div>
          </Section>
        </div>
      </div>
    </div>
  );
}

}

function Field({ label, sub, children, full, icon }) {

function EcoInput({ interventions, ecoInputs, updateEcoInput }) {
  const [open, setOpen] = useState({ 1: true, 2: false, 3: false, 4: false, 5: false });
  const grouped = useMemo(() => {
    const g = { 1: [], 2: [], 3: [], 4: [], 5: [] };
    interventions.forEach(i => { if (g[i.determinant]) g[i.determinant].push(i); });
    return g;
  }, [interventions]);

  return (
    <div className="space-y-3">
      <p style={{ fontSize: 14, color: T.inkSoft, lineHeight: 1.6, marginBottom: 8, maxWidth: 720 }}>
        For each intervention type, reflect on what is happening in this ecosystem. Rough estimates are fine — the tool is designed to surface patterns, not reward precision. Skip rows where you have no view.
      </p>
      {Object.entries(grouped).map(([dId, items]) => {
        const d = DETERMINANTS[dId];
        if (!d) return null;
        const expanded = open[dId];
        const filled = items.filter(i => {
          const v = ecoInputs[i.id];
          return v && (v.reach || v.efficacy || v.count);
        }).length;
        return (
          <div key={dId} style={{ background: T.boneLight, border: `1px solid ${T.hairSoft}`, borderRadius: 10, overflow: 'hidden' }}>
            <button onClick={() => setOpen(o => ({ ...o, [dId]: !o[dId] }))}

              aria-expanded={expanded}
              aria-label={`${expanded ? 'Collapse' : 'Expand'} ${d.name} — ${filled} of ${items.length} assessed`}>

                <div style={{ width: 8, height: 8, borderRadius: '50%', background: d.color }} aria-hidden="true" />
                <div>
                  <div className="serif" style={{ fontSize: 18, fontWeight: 500 }}>{d.name}</div>
                  <div style={{ fontSize: 12, color: T.muted, marginTop: 2 }}>{d.subtitle}</div>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <span style={{ fontSize: 12, color: T.muted }}>{filled} / {items.length}</span>
                {expanded ? <ChevronDown size={18} color={T.muted} aria-hidden="true" /> : <ChevronRight size={18} color={T.muted} aria-hidden="true" />}

function EcoResults({ interventions, ecoInputs, ecoMeta }) {
  const stats = useMemo(() => {
    const items = interventions.map(i => {
      const v = ecoInputs[i.id] || {};
      return { ...i,
        count: typeof v.count === 'number' ? v.count : null,
        reach: v.reach || null, efficacy: v.efficacy || null, notes: v.notes || ''
      };
    });
    const assessed = items.filter(i => i.reach && i.efficacy);
    const withCount = items.filter(i => typeof i.count === 'number');
    const totalInit = withCount.reduce((s, i) => s + (i.count || 0), 0);
    const withNotes = items.filter(i => i.notes && i.notes.trim()).length;

    const matrix = {};
    REACH_LEVELS.forEach(r => { matrix[r] = {}; EFFICACY_LEVELS.forEach(e => matrix[r][e] = []); });
    assessed.forEach(i => matrix[i.reach][i.efficacy].push(i));

    const signals = {
      highReachLowEfficacy: assessed.filter(i => i.reach === 'High' && i.efficacy === 'Low'),
      lowReachHighEfficacy: assessed.filter(i => i.reach === 'Low' && i.efficacy === 'High'),
      gaps: items.filter(i => (i.count === 0 || i.count === null) && i.reach === 'Low'),
      concentration: items.filter(i => (i.count || 0) >= 5 && i.reach === 'High'),
      mixed: assessed.filter(i =>
        (i.reach === 'High' && i.efficacy === 'Low') ||
        (i.reach === 'Low'  && i.efficacy === 'High')
      ),
    };

    return { items, assessed, withCount, totalInit, withNotes, matrix, signals };
  }, [interventions, ecoInputs]);

  const anyData = stats.assessed.length > 0 || stats.totalInit > 0;
  if (!anyData) return <EmptyState icon={<Compass size={42} />}>Start in the <strong>Reflect</strong> tab. As you enter reach and efficacy judgements, this view will fill in with the patterns.</EmptyState>;

  return (
    <div className="space-y-8 fade-up">
      {ecoMeta.name && (
        <div style={{ padding: '14px 18px', background: T.parchment, borderRadius: 10, fontSize: 13.5 }}>
          <span className="serif-italic" style={{ color: T.muted, marginRight: 8 }}>You are looking at:</span>
          <strong>{ecoMeta.name}</strong>
          {ecoMeta.timeframe && <span style={{ color: T.muted }}> · {ecoMeta.timeframe}</span>}
          {ecoMeta.completedBy && <span style={{ color: T.muted }}> · by {ecoMeta.completedBy}</span>}
        </div>
      )}

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <StatTile label="Interventions mapped" value={stats.assessed.length} sub={`of ${interventions.length}`} icon={<Compass size={13} />} />
        <StatTile label="Total initiatives" value={stats.totalInit} sub="across the ecosystem" icon={<Layers size={13} />} />
        <StatTile label="With notes" value={stats.withNotes} sub="captured reflections" icon={<FileText size={13} />} />
        <StatTile label="Not yet assessed" value={interventions.length - stats.assessed.length} sub="rows still to walk" icon={<Search size={13} />} />
      </div>

      <Card>
        <div className="flex items-center justify-between flex-wrap gap-2 mb-2">
          <h3 className="serif" style={{ fontSize: 20, fontWeight: 500 }}>Ecosystem map</h3>
          <div style={{ fontSize: 12, color: T.muted }}>Bubble size = number of initiatives · Colour = determinant</div>
        </div>
        <p style={{ fontSize: 13, color: T.inkSoft, lineHeight: 1.5, marginBottom: 12 }}>
          Each bubble is one intervention type, positioned by reach (across) and efficacy (up). Top-right is dense, working effort. Bottom-right is high reach but weak impact. Top-left is strong work that is reaching few.
        </p>
        <EcosystemBubble items={stats.assessed} />
        <InterventionKey items={stats.items} />
      </Card>

      <div className="grid lg:grid-cols-2 gap-5">
        <Card>
          <h3 className="serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 2 }}>Reach × Efficacy distribution</h3>
          <p style={{ fontSize: 13, color: T.muted, marginBottom: 16 }}>How many interventions sit in each quadrant?</p>
          <ReachEfficacyMatrix matrix={stats.matrix} />
        </Card>
        <Card>
          <h3 className="serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 2 }}>Discussion signals</h3>
          <p style={{ fontSize: 13, color: T.muted, marginBottom: 16 }}>Not conclusions — prompts for the kōrero.</p>
          <SignalsList signals={stats.signals} />
        </Card>
      </div>

      {stats.items.some(i => i.notes && i.notes.trim()) && (
        <Card>
          <h3 className="serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 14 }}>Notes captured</h3>
          <div className="space-y-3">
            {stats.items.filter(i => i.notes && i.notes.trim()).map(i => {
              const d = DETERMINANTS[i.determinant];
              if (!d) return null;
              return (
                <div key={i.id} style={{ borderLeft: `3px solid ${d.color}`, padding: '4px 14px' }}>
                  <div style={{ fontSize: 13, fontWeight: 500 }}>{i.name}</div>
                  <div style={{ fontSize: 13, color: T.inkSoft, lineHeight: 1.55, marginTop: 4 }}>{i.notes}</div>
                </div>
              );
            })}
          </div>
        </Card>
      )}
    </div>
  );
}

      </div>

}

function EcosystemBubble({ items }) {
  const data = useMemo(() => {
    const buckets = {};
    const maxCount = Math.max(...items.map(i => i.count || 1), 1);
    return items.map(i => {
      const key = `${i.reach}-${i.efficacy}`;
      buckets[key] = (buckets[key] || 0) + 1;
      const k = buckets[key];
      const ang = k * 1.7;
      const rad = k === 1 ? 0 : 0.20 * Math.sqrt(k);
      const d = DETERMINANTS[i.determinant];
      // Area-proportional sizing relative to the largest count in the dataset.
      // sqrt of share = perceptually-correct area scaling.
      const share = Math.sqrt((i.count || 1) / maxCount);
      return {
        x: REACH_SCORE[i.reach] + Math.cos(ang) * rad,
        y: EFFICACY_SCORE[i.efficacy] + Math.sin(ang) * rad,
        z: share,
        count: i.count || 0, name: i.name, id: i.id,
        color: d ? d.color : T.muted,
        determinant: d ? d.name : 'Unknown',
      };
    });
  }, [items]);

  return (
    <div style={{ height: 480, marginTop: 8 }}>
      <ResponsiveContainer width="100%" height="100%">
        <ScatterChart margin={{ top: 16, right: 32, bottom: 44, left: 32 }}>
          <CartesianGrid stroke={T.hair} strokeDasharray="2 4" />
          <XAxis type="number" dataKey="x" domain={[0.5, 3.5]} ticks={[1,2,3]} tickFormatter={t => REACH_LEVELS[t-1] || ''}
            tick={{ fill: T.muted, fontSize: 12 }} axisLine={{ stroke: T.hair }} tickLine={{ stroke: T.hair }}
            label={{ value: 'Reach →', position: 'bottom', offset: 12, fill: T.inkSoft, fontSize: 13, fontStyle: 'italic' }} />
          <YAxis type="number" dataKey="y" domain={[0.5, 3.5]} ticks={[1,2,3]} tickFormatter={t => EFFICACY_LEVELS[t-1] || ''}
            tick={{ fill: T.muted, fontSize: 12 }} axisLine={{ stroke: T.hair }} tickLine={{ stroke: T.hair }}
            label={{ value: 'Efficacy →', angle: -90, position: 'insideLeft', offset: -6, fill: T.inkSoft, fontSize: 13, fontStyle: 'italic' }} />
          <ZAxis dataKey="z" range={[280, 3800]} />
          <Tooltip content={<BubbleTooltip />} cursor={{ stroke: T.hair, strokeDasharray: '3 3' }} />
          <ReferenceLine x={2} stroke={T.hair} strokeDasharray="3 3" />
          <ReferenceLine y={2} stroke={T.hair} strokeDasharray="3 3" />
          <Scatter data={data}>
            {data.map((d, idx) => (
              <Cell key={idx} fill={d.color} fillOpacity={0.65} stroke={d.color} strokeWidth={1.8} />
            ))}
            <LabelList dataKey="id" position="center" fill={T.bone} style={{ fontSize: 12, fontWeight: 700 }} />
          </Scatter>
        </ScatterChart>
      </ResponsiveContainer>
    </div>
  );
}

function BubbleTooltip({ active, payload }) {
  if (!active || !payload || !payload.length) return null;
  const p = payload[0].payload;
  return (
    <div style={{ background: T.boneLight, border: `1px solid ${T.hair}`, borderRadius: 8, padding: '10px 12px', fontSize: 12, boxShadow: '0 4px 16px rgba(0,0,0,0.08)' }}>
      <div style={{ fontWeight: 600, marginBottom: 2 }}><span style={{ color: p.color }}>●</span> {p.name}</div>
      <div style={{ color: T.muted }}>{p.determinant} · {p.count} initiative{p.count === 1 ? '' : 's'}</div>
    </div>
  );
}

function DeterminantLegend() {

    <div className="flex flex-wrap gap-3 mt-4 pt-3" style={{ borderTop: `1px dashed ${T.hairSoft}` }}>
      {Object.values(DETERMINANTS).map(d => (
        <div key={d.name} className="flex items-center gap-1.5" style={{ fontSize: 12, color: T.inkSoft }}>
          <span style={{ width: 10, height: 10, borderRadius: '50%', background: d.color }} />
          {d.name}
        </div>
      ))}

}

function InterventionKey({ items }) {
  // Group by determinant, preserve original ID order within groups
  const grouped = useMemo(() => {
    const g = { 1: [], 2: [], 3: [], 4: [], 5: [] };
    items.forEach(i => { if (g[i.determinant]) g[i.determinant].push(i); });
    Object.values(g).forEach(arr => arr.sort((a, b) => a.id - b.id));
    return g;
  }, [items]);

  const totalAssessed = items.filter(i => i.reach && i.efficacy).length;

  return (
    <div style={{ marginTop: 24, paddingTop: 18, borderTop: `1px dashed ${T.hairSoft}` }}>
      <div className="flex items-baseline justify-between flex-wrap gap-2" style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: T.muted, fontWeight: 600 }}>
          Intervention key — all {items.length} interventions, grouped by determinant
        </div>
        <div style={{ fontSize: 11, color: T.muted, fontStyle: 'italic' }}>
          {totalAssessed} assessed · {items.length - totalAssessed} not yet
        </div>
      </div>
      <div className="space-y-4">
        {Object.entries(grouped).map(([dId, list]) => {
          const d = DETERMINANTS[dId];
          if (!d || list.length === 0) return null;
          return (
            <div key={dId}>
              <div className="flex items-baseline gap-2" style={{ marginBottom: 6 }}>
                <span style={{ width: 8, height: 8, borderRadius: '50%', background: d.color, alignSelf: 'center' }} />
                <span className="serif" style={{ fontSize: 14, fontWeight: 500, color: d.color }}>{d.name}</span>
                <span style={{ fontSize: 11, color: T.muted, fontStyle: 'italic' }}>· {d.subtitle}</span>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(290px, 1fr))', gap: '3px 18px' }}>
                {list.map(it => {
                  const assessed = it.reach && it.efficacy;
                  return (
                    <div key={it.id} className="flex items-center gap-2"
                         style={{
                           fontSize: 12.5,
                           color: assessed ? T.inkSoft : T.muted,
                           padding: '4px 6px',
                           borderRadius: 4,
                           opacity: assessed ? 1 : 0.7,
                         }}>
                      <span style={{
                        width: 24, height: 24, borderRadius: 5,
                        background: assessed ? d.color : d.tint,
                        color: assessed ? T.bone : d.color,
                        fontSize: 11, fontWeight: 700,
                        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                        flexShrink: 0,
                      }}>{it.id}</span>
                      <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}
                            title={it.name}>{it.name}</span>
                      {typeof it.count === 'number' && (
                        <span style={{ fontSize: 11, color: T.muted, fontVariantNumeric: 'tabular-nums', minWidth: 28, textAlign: 'right' }}
                              title="Number of initiatives">{it.count}</span>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ReachEfficacyMatrix({ matrix }) {
  const reaches = ['High', 'Medium', 'Low'];
  const effs = ['Low', 'Medium', 'High'];
  return (
    <div>
      <div style={{ display: 'grid', gridTemplateColumns: '60px 1fr 1fr 1fr', gap: 6 }}>
        <div></div>
        {effs.map(e => <div key={e} style={{ textAlign: 'center', fontSize: 11, color: T.muted, textTransform: 'uppercase', letterSpacing: '0.06em' }}>{e} efficacy</div>)}
        {reaches.map(r => (
          <Fragment key={r}>
            <div style={{ fontSize: 11, color: T.muted, textTransform: 'uppercase', letterSpacing: '0.06em', alignSelf: 'center', textAlign: 'right', paddingRight: 4 }}>{r} reach</div>
            {effs.map(e => {
              const cell = matrix[r][e];
              const n = cell.length;
              const intensity = Math.min(1, n / 6);
              return (
                <div key={r+e} title={cell.map(c=>c.name).join('\n')}
                  style={{
                    background: `rgba(42, 64, 52, ${0.05 + 0.55 * intensity})`,
                    border: `1px solid ${T.hairSoft}`,
                    borderRadius: 6, padding: 12, minHeight: 64,
                    display: 'flex', flexDirection: 'column', justifyContent: 'space-between'
                  }}>
                  <div className="serif" style={{ fontSize: 24, fontWeight: 500, color: intensity > 0.4 ? T.bone : T.ink }}>{n}</div>
                  <div style={{ fontSize: 10, color: intensity > 0.4 ? T.bone : T.muted, opacity: 0.85 }}>
                    {cell.slice(0, 2).map(c => c.id).join(' · ')}{cell.length > 2 && ` · +${cell.length-2}`}
                  </div>
                </div>
              );
            })}
          </Fragment>
        ))}
      </div>
    </div>
  );
}

function SignalsList({ signals }) {
  const rows = [
    { key: 'highReachLowEfficacy', label: 'High reach + Low efficacy', hint: 'a lot of activity, little change',    items: signals.highReachLowEfficacy, tone: T.clay,   icon: <AlertCircle size={15} /> },
    { key: 'lowReachHighEfficacy', label: 'Low reach + High efficacy', hint: 'strong work that could be amplified', items: signals.lowReachHighEfficacy, tone: T.forest, icon: <TrendingUp size={15} /> },

function PortfolioResults({ interventions, portfolioInputs }) {
  const data = useMemo(() => {
    const items = interventions.map(i => ({ ...i, spend: Number(portfolioInputs[i.id]?.spend) || 0 })).filter(i => i.spend > 0);
    const total = items.reduce((s, i) => s + i.spend, 0);

    const byDet = Object.values(DETERMINANTS).map(d => {
      const dItems = items.filter(i => DETERMINANTS[i.determinant] && DETERMINANTS[i.determinant].name === d.name);
      const spend = dItems.reduce((s, i) => s + i.spend, 0);
      return { name: d.name, short: d.short, spend, color: d.color, share: total ? spend / total : 0, count: dItems.length };
    }).filter(d => d.spend > 0).sort((a,b) => b.spend - a.spend);

    const horizonOf = (t) => t <= 3 ? 'Short (≤3)' : t <= 7 ? 'Medium (4–7)' : 'Long (8–10)';
    const byHorizon = ['Short (≤3)', 'Medium (4–7)', 'Long (8–10)'].map(label => {
      const hItems = items.filter(i => horizonOf(i.time) === label);
      const spend = hItems.reduce((s, i) => s + i.spend, 0);
      return { name: label, spend, share: total ? spend / total : 0 };
    });

    const depthOf = (d) => d <= 3 ? 'Shallow (≤3)' : d <= 6 ? 'Moderate (4–6)' : 'Deep (7–10)';
    const byDepth = ['Shallow (≤3)', 'Moderate (4–6)', 'Deep (7–10)'].map(label => {
      const dItems = items.filter(i => depthOf(i.depth) === label);
      const spend = dItems.reduce((s, i) => s + i.spend, 0);
      return { name: label, spend, share: total ? spend / total : 0 };
    });

    // Build jitter buckets so overlapping bubbles at the same (time,depth) don't stack
    const frontierBuckets = {};
    items.forEach(i => {
      const key = `${i.time}-${i.depth}`;
      frontierBuckets[key] = (frontierBuckets[key] || 0) + 1;
    });
    const frontierCounters = {};
    const maxSpend = Math.max(...items.map(i => i.spend), 1);
    const frontier = items.map(i => {
      const d = DETERMINANTS[i.determinant];
      const key = `${i.time}-${i.depth}`;
      frontierCounters[key] = (frontierCounters[key] || 0) + 1;
      const k = frontierCounters[key];
      const bucketSize = frontierBuckets[key];
      // Jitter overlapping bubbles in a small circle around the true coordinate
      let dx = 0, dy = 0;
      if (bucketSize > 1) {
        const ang = (k - 1) * (Math.PI * 2 / bucketSize) + 0.3;
        const rad = 0.38;
        dx = Math.cos(ang) * rad;
        dy = Math.sin(ang) * rad;
      }
      // Area-proportional sizing relative to the largest spend in the portfolio
      // sqrt gives perceptually-correct area scaling
      const share = Math.sqrt(i.spend / maxSpend);
      return {
        x: i.time + dx, y: i.depth + dy,
        z: share,
        spend: i.spend, name: i.name, id: i.id,
        color: d ? d.color : T.muted, determinant: d ? d.name : 'Unknown',
      };
    });

    const top = [...items].sort((a,b) => b.spend - a.spend).slice(0, 5);
    return { items, total, byDet, byHorizon, byDepth, frontier, top };
  }, [interventions, portfolioInputs]);

  if (data.items.length === 0) return <EmptyState icon={<DollarSign size={42} />}>Enter at least one spend figure in the <strong>Enter spend</strong> tab. As you do, this view will fill in with the patterns.</EmptyState>;

  return (
    <div className="space-y-8 fade-up">
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <StatTile label="Total annual spend" value={`$${data.total.toLocaleString()}`} icon={<DollarSign size={13} />} />
        <StatTile label="Interventions funded" value={`${data.items.length}`} sub={`of ${interventions.length}`} icon={<PieIcon2 size={13} />} />
        <StatTile label="Determinants touched" value={data.byDet.length} sub={`of ${Object.keys(DETERMINANTS).length}`} icon={<Layers size={13} />} />
        <StatTile label="Concentration" value={data.byDet[0] ? `${Math.round(data.byDet[0].share * 100)}%` : '—'} sub={data.byDet[0] ? `in ${data.byDet[0].short}` : ''} accent={data.byDet[0]?.color} icon={<Target size={13} />} />
      </div>

      <Card>
        <h3 className="serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 2 }}>Balance across determinants</h3>
        <p style={{ fontSize: 13, color: T.muted, marginBottom: 16 }}>Where your spend is concentrated — and where it isn’t.</p>
        <DeterminantBalance data={data.byDet} total={data.total} />
      </Card>
      <Card>
        <h3 className="serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 2 }}>Cost–impact frontier</h3>
        <p style={{ fontSize: 13, color: T.muted, marginBottom: 16 }}>Time to impact (across) vs. depth of change (up). Bubble size = your spend, relative to your largest line.</p>
        <Frontier data={data.frontier} />
      </Card>

      <div className="grid lg:grid-cols-2 gap-5">
        <Card>
          <h3 className="serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 2 }}>Time horizon mix</h3>
          <p style={{ fontSize: 13, color: T.muted, marginBottom: 16 }}>What you are implicitly prioritising in time.</p>
          <HorizontalBars data={data.byHorizon} total={data.total} color={T.forest} />
        </Card>
        <Card>
          <h3 className="serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 2 }}>Depth of change mix</h3>
          <p style={{ fontSize: 13, color: T.muted, marginBottom: 16 }}>What kinds of change your spend supports.</p>
          <HorizontalBars data={data.byDepth} total={data.total} color={T.clay} />
        </Card>
      </div>

      <Card>
        <div className="flex items-center gap-2 mb-4">
          <Award size={18} color={T.ochre} aria-hidden="true" />
          <h3 className="serif" style={{ fontSize: 20, fontWeight: 500 }}>Where the most money flows</h3>
        </div>
        <div className="space-y-2">
          {data.top.map((i, idx) => {
            const d = DETERMINANTS[i.determinant];
            const pct = data.total ? (i.spend / data.total) * 100 : 0;
            return (
              <div key={i.id} className="flex items-center gap-3">
                <span style={{
                  width: 26, height: 26, borderRadius: 6,
                  background: idx === 0 ? T.ochre : (idx === 1 ? T.sand : T.hair),
                  color: idx <= 1 ? T.bone : T.inkSoft,
                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 12, fontWeight: 700, fontVariantNumeric: 'tabular-nums', flexShrink: 0
                }} aria-label={`Rank ${idx+1}`}>{idx+1}</span>
                <span className="flex-1" style={{ fontSize: 14 }}>{i.name}</span>
                <div style={{ width: 220, background: T.parchment, borderRadius: 4, height: 8, overflow: 'hidden' }} role="progressbar" aria-valuenow={Math.round(pct)} aria-valuemin={0} aria-valuemax={100} aria-label={`${pct.toFixed(1)} percent of total`}>
                  <div style={{ background: d ? d.color : T.muted, height: '100%', width: `${pct}%` }} />
                </div>
                <span style={{ width: 130, textAlign: 'right', fontSize: 13, fontVariantNumeric: 'tabular-nums' }}>${i.spend.toLocaleString()}</span>
                <span style={{ width: 50, textAlign: 'right', fontSize: 12, color: T.muted, fontVariantNumeric: 'tabular-nums' }}>{pct.toFixed(1)}%</span>
              </div>
            );
          })}
        </div>
      </Card>

      <Card style={{ background: T.parchment, border: 'none' }}>
        <div className="flex items-start gap-3">
          <MessageCircle size={20} color={T.forest} style={{ flexShrink: 0, marginTop: 2 }} aria-hidden="true" />
          <div className="serif-italic" style={{ fontSize: 16, color: T.inkSoft, lineHeight: 1.6 }}>
            A mirror, not a scorecard. Does this pattern reflect your intent? Where are you over- or under-exposed? What risks are you holding — or avoiding — through this mix?
          </div>
        </div>
      </Card>
    </div>
  );
}

function Library({ interventions, setInterventions, showToast, isAdmin, enableAdmin, disableAdmin }) {
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(false);

  const startEdit = (it) => setEditing({ ...it });
  const saveEdit = () => {
    if (!editing.name.trim()) return;
    setInterventions(prev => prev.map(i => i.id === editing.id ? editing : i));
    setEditing(null);
    showToast('Intervention updated');
  };
  const del = (id) => {
    if (!confirm('Delete this intervention? Any inputs against it will remain in your data but become orphaned.')) return;
    setInterventions(prev => prev.filter(i => i.id !== id));
    showToast('Intervention deleted');
  };
  const addNew = () => {
    if (!editing.name.trim()) return;
    const maxId = Math.max(0, ...interventions.map(i => i.id));
    setInterventions(prev => [...prev, { ...editing, id: maxId + 1 }]);
    setAdding(false); setEditing(null);
    showToast('Intervention added');
  };
  const resetLibrary = () => {
    if (!confirm('Reset the library back to the original 30 interventions? Any custom interventions will be lost.')) return;
    setInterventions(DEFAULT_INTERVENTIONS);
    showToast('Library reset to defaults');
  };

  const grouped = useMemo(() => {
    const g = { 1: [], 2: [], 3: [], 4: [], 5: [] };
    interventions.forEach(i => { if (g[i.determinant]) g[i.determinant].push(i); });
    return g;
  }, [interventions]);

  return (
    <div className="fade-up pt-10">
      <Eyebrow tone={T.slate}>Library</Eyebrow>
      <div className="flex items-center justify-between flex-wrap gap-3 mb-2">
        <h2 className="serif" style={{ fontSize: 'clamp(30px, 4vw, 44px)', fontWeight: 400, letterSpacing: '-0.02em' }}>Interventions</h2>
        <div className="flex gap-2">
          {isAdmin ? (
            <Fragment>
              <button onClick={resetLibrary} style={buttonStyle('secondary')}><RotateCcw size={14} /> Reset to defaults</button>
              <button onClick={() => { setEditing({ name: '', determinant: 1, time: 5, cost: 5, depth: 5, definition: '', examples: '' }); setAdding(true); }} style={buttonStyle('primary')}><Plus size={14} /> Add intervention</button>
            </Fragment>
          ) : (
            <button onClick={enableAdmin} style={buttonStyle('secondary')} title="Editing is locked. Enter the admin password to unlock.">
              <Lock size={13} /> Unlock editing
            </button>
          )}
        </div>
      </div>

      {!isAdmin && (
        <div style={{ background: T.boneLight, border: `1px solid ${T.hairSoft}`, borderLeft: `3px solid ${T.ochre}`, borderRadius: 8, padding: '12px 16px', marginBottom: 18, fontSize: 13, color: T.inkSoft, lineHeight: 1.55 }}>
          <strong style={{ color: T.ink }}>Read-only view.</strong> The intervention framework is shown here for reference. To edit, add, or delete interventions, click <em>Unlock editing</em> and enter the admin password. This keeps the framework stable for shared use.
        </div>
      )}

      <p style={{ fontSize: 14, color: T.inkSoft, lineHeight: 1.6, marginBottom: 24, maxWidth: 720 }}>
        The 30 default interventions come from the framework. {isAdmin ? 'You can edit definitions, change scores, or add your own intervention types for this rohe or kaupapa.' : 'The framework is fixed unless an admin unlocks editing.'} Time, cost, and depth scores (each 1–10) shape the cost–impact frontier in the portfolio view.
      </p>

      <div className="space-y-6">
        {Object.entries(grouped).map(([dId, items]) => {
          const d = DETERMINANTS[dId];
          if (!d) return null;
          return (
            <div key={dId}>
              <div className="flex items-baseline gap-3 mb-3">
                <div style={{ width: 10, height: 10, borderRadius: '50%', background: d.color, marginBottom: 2 }} />
                <h3 className="serif" style={{ fontSize: 18, fontWeight: 500 }}>{d.name}</h3>
                <span style={{ fontSize: 12, color: T.muted, fontStyle: 'italic' }}>{d.subtitle}</span>
              </div>
              <div style={{ background: T.boneLight, border: `1px solid ${T.hairSoft}`, borderRadius: 10, overflow: 'hidden' }}>
                {items.map((it, idx) => (
                  <div key={it.id} className="flex items-start gap-3 p-4" style={{ borderBottom: idx < items.length - 1 ? `1px solid ${T.hairSoft}` : 'none' }}>
                    <span style={{ width: 26, height: 26, borderRadius: 5, background: d.tint, color: d.color, fontSize: 11, fontWeight: 600, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 1 }}>{it.id}</span>
                    <div className="flex-1" style={{ minWidth: 0 }}>
                      <div style={{ fontSize: 14, fontWeight: 500 }}>{it.name}</div>
                      <div style={{ fontSize: 12.5, color: T.inkSoft, marginTop: 4, lineHeight: 1.55 }}>{it.definition}</div>
                    </div>
                    <div className="flex items-center gap-3" style={{ flexShrink: 0 }}>
                      <span style={{ fontSize: 11, color: T.muted, fontFamily: 'ui-monospace, monospace' }} title="Time to impact · Cost intensity · Depth of change">
                        T·{it.time} C·{it.cost} D·{it.depth}
                      </span>
                      {isAdmin && (
                        <Fragment>
                          <button onClick={() => startEdit(it)} style={buttonStyle('ghost', 'sm')} aria-label={`Edit ${it.name}`} title={`Edit ${it.name}`}><Edit3 size={13} aria-hidden="true" /></button>
                          <button onClick={() => del(it.id)} style={{ ...buttonStyle('ghost', 'sm'), color: T.clayDark }} aria-label={`Delete ${it.name}`} title={`Delete ${it.name}`}><Trash2 size={13} aria-hidden="true" /></button>
                        </Fragment>
                      )}
                    </div>
                  </div>
                ))}
                {items.length === 0 && (
                  <div style={{ padding: 18, fontSize: 13, color: T.muted, fontStyle: 'italic' }}>No interventions in this determinant.</div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {editing && isAdmin && (
        <InterventionDialog title={adding ? 'Add intervention' : 'Edit intervention'} value={editing} setValue={setEditing}
          onSave={adding ? addNew : saveEdit} onClose={() => { setEditing(null); setAdding(false); }} />
      )}
    </div>
  );
}

function InterventionDialog({ title, value, setValue, onSave, onClose }) {
  const set = (k, v) => setValue({ ...value, [k]: v });
  return (
    <div className="fixed inset-0 fade-in" style={{ background: 'rgba(30, 38, 32, 0.45)', zIndex: 50 }} onClick={onClose}>
      <div className="max-w-xl mx-auto mt-16 fade-up scroll-soft" style={{ background: T.bone, borderRadius: 12, maxHeight: '85vh', overflowY: 'auto' }} onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between p-6 pb-3">
          <h3 className="serif" style={{ fontSize: 22, fontWeight: 500 }}>{title}</h3>
          <button onClick={onClose} style={{ color: T.muted }} aria-label="Close dialog" title="Close"><X size={20} aria-hidden="true" /></button>
        </div>
        <div className="px-6 pb-6 space-y-4">
          <Field label="Name">
            <input value={value.name} onChange={e => set('name', e.target.value)} style={inputStyle()} />
          </Field>
          <Field label="Determinant">
            <select value={value.determinant} onChange={e => set('determinant', Number(e.target.value))} style={inputStyle({ cursor: 'pointer', paddingRight: 30 })}>
              {Object.entries(DETERMINANTS).map(([id, d]) => <option key={id} value={id}>{d.name}</option>)}
            </select>
          </Field>
          <div className="grid grid-cols-3 gap-3">
            <Field label="Time to impact" sub="1 (immediate) – 10 (long)">
              <input type="number" min="1" max="10" value={value.time} onChange={e => set('time', Number(e.target.value))} style={inputStyle()} />
            </Field>
            <Field label="Cost intensity" sub="1 (cheap) – 10 (high)">
              <input type="number" min="1" max="10" value={value.cost} onChange={e => set('cost', Number(e.target.value))} style={inputStyle()} />
            </Field>
            <Field label="Depth of change" sub="1 (shallow) – 10 (deep)">
              <input type="number" min="1" max="10" value={value.depth} onChange={e => set('depth', Number(e.target.value))} style={inputStyle()} />
            </Field>
          </div>
          <Field label="Practical definition" sub="What counts here?">
            <textarea value={value.definition} onChange={e => set('definition', e.target.value)} rows={3} style={{ ...inputStyle(), resize: 'vertical' }} />
          </Field>
          <Field label="Examples & boundaries" sub="What to include and exclude">
            <textarea value={value.examples} onChange={e => set('examples', e.target.value)} rows={3} style={{ ...inputStyle(), resize: 'vertical' }} />
          </Field>
          <div className="flex justify-end gap-2 pt-2">
            <button onClick={onClose} style={buttonStyle('secondary')}>Cancel</button>
            <button onClick={onSave} style={buttonStyle('primary')}><Check size={14} /> Save</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// GUIDE — step-by-step how-to-use page
// ============================================================================
function Guide({ setRoute }) {
  return (
    <div className="fade-up pt-10">
      <Eyebrow tone={T.muted}>User guide</Eyebrow>
      <h2 className="serif" style={{ fontSize: 'clamp(30px, 4vw, 44px)', fontWeight: 400, letterSpacing: '-0.02em', marginBottom: 12 }}>How to use these tools</h2>
      <p style={{ fontSize: 17, color: T.inkSoft, lineHeight: 1.6, maxWidth: 720, marginBottom: 40 }}>
        A short guide to help you get the most out of both tools. Reading this end to end takes about 4 minutes.
      </p>

      {/* ===== 1. Quick orientation ===== */}
      <GuideSection number="1" title="Quick orientation" subtitle="What each tool does, and when to use it">
        <p style={{ marginBottom: 16 }}>
          There are two tools, designed to be used together. Each takes 15 to 30 minutes for a meaningful first pass.
        </p>
        <div className="grid md:grid-cols-2 gap-4">
          <ToolCardMini tone={T.forest} tint="#DCE5DC" icon={<Compass size={16} />} label="Tool 1"
            title="Ecosystem mapping"
            when="When you want to see what is happening around you."
            does="Maps effort across an ecosystem — a rohe, kaupapa, cohort, or funding environment. Surfaces where activity is dense, thin, or absent."
            who="Best for: strategic conversations, planning hui, sense-checking shared assumptions about a sector or region."
            onClick={() => setRoute('ecosystem')}
            cta="Open Ecosystem"
          />
          <ToolCardMini tone={T.clay} tint="#EAD3C8" icon={<PieIcon size={16} />} label="Tool 2"
            title="Portfolio balance"
            when="When you want to see the shape of your own spend."
            does="Surfaces where your portfolio is concentrated, what time horizons you implicitly prioritise, and where the trade-offs sit."
            who="Best for: funding reviews, board conversations, internal strategy reflection."
            onClick={() => setRoute('portfolio')}
            cta="Open Portfolio"
          />
        </div>
      </GuideSection>

      {/* ===== 2. Using the Ecosystem Mapping tool ===== */}
      <GuideSection number="2" title="Using the Ecosystem Mapping tool" subtitle="Three short steps">
        <GuideStep n={1} title="Set up the kaupapa">
          <p>Open <strong>Ecosystem</strong> in the top navigation. The <strong>Setup</strong> tab asks for a few details — the name of the ecosystem you are mapping, what it covers, the timeframe you have in mind, and who is completing the tool. This context helps anyone reading the results later understand the lens.</p>
        </GuideStep>
        <GuideStep n={2} title="Walk the interventions">
          <p>Go to the <strong>Reflect</strong> tab. You will see 30 intervention types grouped under five determinants — Human Potential, Systemic, Physical, Behavioural, and Symptomatic. Click any intervention to expand its definition and boundary guidance.</p>
          <p>For each one, give a rough sense of:</p>
          <GuideBullets items={[
            ['# of initiatives', 'How many things are happening in this space? A rough number is fine.'],
            ['Reach', 'How many people or whānau are being touched, and how consistently? Low, Medium, or High.'],
            ['Efficacy', 'How well does this kind of work seem to be landing in this context? Low, Medium, or High.'],
            ['Notes (optional)', 'Examples that shaped your judgement, uncertainty, areas for further insight.'],
          ]} />
          <CalloutTip>
            Skip anything you have no view on. The tool is not asking for a complete dataset — it is helping you surface a shared picture from what you already know.
          </CalloutTip>
        </GuideStep>
        <GuideStep n={3} title="See and discuss">
          <p>Go to the <strong>See</strong> tab to view the patterns. Three key visuals appear:</p>
          <GuideBullets items={[
            ['Ecosystem map', 'Each bubble is one intervention, positioned by reach and efficacy. Bubble size shows the number of initiatives. Top-right = lots happening, working well. Bottom-right = lots happening, working poorly.'],
            ['Reach × Efficacy distribution', 'Counts how many interventions sit in each quadrant of the map. Useful for spotting concentration.'],
            ['Discussion signals', 'Highlights particular patterns worth talking about — high reach but low efficacy, strong work that could be amplified, gaps, and so on.'],
          ]} />
          <p>The visuals are <em>diagnostic, not evaluative</em>. They are prompts for kōrero, not conclusions.</p>
        </GuideStep>
      </GuideSection>

      {/* ===== 3. Using the Portfolio Balance tool ===== */}
      <GuideSection number="3" title="Using the Portfolio Balance tool" subtitle="Two short steps">
        <GuideStep n={1} title="Enter your spend">
          <p>Open <strong>Portfolio</strong> in the top navigation. In the <strong>Enter spend</strong> tab, type your approximate annual spend against each intervention type that applies. High-level figures are fine — line by line detail is not the point.</p>
          <GuideBullets items={[
            ['Spans multiple types?', 'Allocate to the intervention type that best matches the primary mechanism of change, or split across rows.'],
            ['Not sure of an exact figure?', 'Use a round estimate. The tool is designed to surface patterns, not to reward fine-grained accuracy.'],
            ['Have a portfolio of $0 for some types?', 'Leave them blank. The visuals will show what you fund — and what you do not.'],
          ]} />
        </GuideStep>
        <GuideStep n={2} title="See and discuss">
          <p>Go to the <strong>See</strong> tab. Five panels appear:</p>
          <GuideBullets items={[
            ['Top-line stats', 'Total annual spend, interventions funded, determinants touched, and your single largest concentration.'],
            ['Balance across determinants', 'A donut showing where your spend sits across the five determinants.'],
            ['Cost–impact frontier', 'Each bubble is an intervention you fund, positioned by time-to-impact and depth-of-change. Bubble size is your spend, relative to your largest line. Bottom-left = fast, shallow change. Top-right = slow, deep change.'],
            ['Time horizon mix and Depth of change mix', 'Shows how your spend distributes across short/medium/long horizons and shallow/moderate/deep change.'],
            ['Where the most money flows', 'Your top 5 funded interventions by spend.'],
          ]} />
        </GuideStep>
      </GuideSection>

      {/* ===== 4. Using results in conversation ===== */}
      <GuideSection number="4" title="Turning visuals into kōrero" subtitle="Questions worth sitting with">
        <p style={{ marginBottom: 16 }}>The real value of these tools is not in the visuals themselves but in what they prompt. A few questions worth working through:</p>
        <div className="grid md:grid-cols-2 gap-3">
          <Prompt q="Where is a lot happening, but little seems to be changing?" hint="High reach + low efficacy — invitation to ask why" />
          <Prompt q="Where is strong work happening that could be better supported?" hint="Low reach + high efficacy — invitation to amplify" />
          <Prompt q="Where are there clear gaps or absences?" hint="Low count, low reach — invitation to ask who could fill it" />
          <Prompt q="Where might coordination, partnership, or role clarity add value?" hint="Crowded, mixed-efficacy spaces" />
          <Prompt q="Does your portfolio pattern reflect your intent?" hint="Check the donut against your stated priorities" />
          <Prompt q="Where might you be over- or under-exposed?" hint="Concentration vs. diversification across determinants" />
        </div>
      </GuideSection>

      {/* ===== 5. Saving, sharing, returning ===== */}
      <GuideSection number="5" title="Saving, sharing, and returning" subtitle="Working between sessions">
        <GuideBullets items={[
          ['Auto-save', 'Your work is saved automatically to your browser as you go. Come back to the same URL on the same device and your inputs are still there.'],
          ['Shareable link', 'Click Save & Share (top right) → Copy link. The entire assessment is encoded in the URL — paste it to a colleague and they see exactly what you saw.'],
          ['Snapshots', 'Save named versions of your assessment to compare over time (e.g. "Te Tai Tokerau Nov 2025" vs "Te Tai Tokerau Nov 2026").'],
          ['Export JSON', 'For backup or to send the raw data as an attachment.'],
          ['Reset', 'Returns everything to defaults. Use carefully — this cannot be undone.'],
        ]} />
      </GuideSection>

      {/* ===== 6. FAQ ===== */}
      <GuideSection number="6" title="Common questions">
        <FaqItem q="Do I need perfect data?">
          No. These are sense-making tools, not measurement tools. Rough estimates and lived judgement are the point. Disagreement is expected — and useful.
        </FaqItem>
        <FaqItem q="Are reach and efficacy formal measures?">
          No. They are subjective judgements, made through your knowledge of the ecosystem. Two people may rate the same intervention differently, and that disagreement is often where the most interesting conversation sits.
        </FaqItem>
        <FaqItem q="Can I edit the 30 interventions?">
          The framework is read-only by default to keep it stable when sharing. An administrator can unlock editing from the Interventions tab with a password. If you need to tailor the framework for a specific kaupapa, ask whoever shared this tool with you.
        </FaqItem>
        <FaqItem q="Is my data sent anywhere?">
          No. Everything happens in your browser. Nothing is sent to a server. Your data lives on your device unless you choose to share it via the shareable link.
        </FaqItem>
        <FaqItem q="Will this work on my phone?">
          Yes, though the visuals are easier to read on a laptop or tablet.
        </FaqItem>
        <FaqItem q="Can I use this for something other than a rohe or kaupapa Māori context?">
          Yes. The 30 intervention framework is general — it applies to any social, health, or wellbeing ecosystem. The te reo touches in the language reflect the kaupapa Māori origins of the framework but the tool itself is broadly applicable.
        </FaqItem>
      </GuideSection>

      {/* ===== Closing ===== */}
      <div style={{ background: T.parchment, borderRadius: 12, padding: '28px 32px', marginTop: 40 }}>
        <div className="serif-italic" style={{ fontSize: 18, color: T.inkSoft, lineHeight: 1.6, marginBottom: 16 }}>
          The role of these tools is to make patterns visible so that decisions can be made more deliberately, transparently, and collectively. Used well, they shift the conversation from &ldquo;what is needed?&rdquo; to &ldquo;where is our contribution most meaningful?&rdquo;
        </div>
        <div className="flex gap-2 flex-wrap">
          <button onClick={() => setRoute('ecosystem')} style={buttonStyle('primary')}><Compass size={14} /> Open Ecosystem</button>
          <button onClick={() => setRoute('portfolio')} style={buttonStyle('secondary')}><PieIcon size={14} /> Open Portfolio</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// GUIDE — supporting components
// ============================================================================
function GuideSection({ number, title, subtitle, children }) {
  return (
    <section style={{ marginBottom: 56 }}>
      <div className="flex items-baseline gap-4 mb-2">
        <div style={{ fontFamily: 'Fraunces, serif', fontStyle: 'italic', fontSize: 38, fontWeight: 400, color: T.clay, lineHeight: 1, minWidth: 40 }}>{number}</div>
        <div>
          <h3 className="serif" style={{ fontSize: 26, fontWeight: 500, lineHeight: 1.15, color: T.ink }}>{title}</h3>
          {subtitle && <div style={{ fontSize: 14, color: T.muted, fontStyle: 'italic', marginTop: 4 }}>{subtitle}</div>}
        </div>
      </div>
      <div style={{ paddingLeft: 56, fontSize: 15, color: T.inkSoft, lineHeight: 1.7 }}>{children}</div>
    </section>
  );
}

function GuideStep({ n, title, children }) {
  return (
    <div style={{ marginBottom: 22, paddingLeft: 18, borderLeft: `2px solid ${T.hair}` }}>
      <div className="flex items-baseline gap-3 mb-2">
        <span style={{ width: 24, height: 24, borderRadius: '50%', background: T.forest, color: T.bone, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 600, flexShrink: 0 }}>{n}</span>
        <h4 className="serif" style={{ fontSize: 18, fontWeight: 500, color: T.ink }}>{title}</h4>
      </div>
      <div className="space-y-2" style={{ paddingLeft: 36 }}>{children}</div>
    </div>
  );
}

function GuideBullets({ items }) {
  return (
    <ul style={{ listStyle: 'none', padding: 0, margin: '8px 0' }}>
      {items.map(([label, desc], i) => (
        <li key={i} style={{ display: 'flex', gap: 10, marginBottom: 6, fontSize: 14, lineHeight: 1.6 }}>
          <span style={{ color: T.ochre, flexShrink: 0, marginTop: 2 }}>▸</span>
          <span>
            <strong style={{ color: T.ink }}>{label}</strong>{desc && <span style={{ color: T.inkSoft }}> — {desc}</span>}
          </span>
        </li>
      ))}
    </ul>
  );
}

function CalloutTip({ children }) {
  return (
    <div style={{ background: T.boneLight, border: `1px solid ${T.hairSoft}`, borderLeft: `3px solid ${T.ochre}`, borderRadius: 8, padding: '12px 16px', marginTop: 12, fontSize: 13.5, color: T.inkSoft, lineHeight: 1.55, fontStyle: 'italic' }}>
      {children}
    </div>
  );
}

function Prompt({ q, hint }) {
  return (
    <div style={{ background: T.boneLight, border: `1px solid ${T.hairSoft}`, borderRadius: 8, padding: '14px 16px' }}>
      <div style={{ fontSize: 14, fontWeight: 500, color: T.ink, lineHeight: 1.4, marginBottom: 4 }}>{q}</div>
      <div style={{ fontSize: 12, color: T.muted, fontStyle: 'italic' }}>{hint}</div>
    </div>
  );
}

function FaqItem({ q, children }) {
  return (
    <div style={{ marginBottom: 16, paddingBottom: 16, borderBottom: `1px dashed ${T.hairSoft}` }}>
      <div className="flex items-baseline gap-2 mb-1">
        <HelpCircle size={15} color={T.ochre} />
        <strong style={{ color: T.ink, fontSize: 15 }}>{q}</strong>
      </div>
      <div style={{ fontSize: 14, color: T.inkSoft, lineHeight: 1.6, paddingLeft: 22 }}>{children}</div>
    </div>
  );
}

function ToolCardMini({ tone, tint, icon, label, title, when, does, who, onClick, cta }) {
  return (
    <button onClick={onClick} className="text-left hover-lift" style={{
      background: T.boneLight, borderRadius: 12, padding: 22,
      border: `1px solid ${T.hairSoft}`, position: 'relative', overflow: 'hidden'
    }}>
      <div style={{ position: 'absolute', top: -30, right: -30, width: 110, height: 110, borderRadius: '50%', background: tint, opacity: 0.45 }} />
      <div style={{ position: 'relative' }}>
        <div className="flex items-center gap-1.5" style={{ color: tone, marginBottom: 10 }}>
          {icon}
          <span style={{ fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase', fontWeight: 500 }}>{label}</span>
        </div>
        <h4 className="serif" style={{ fontSize: 20, fontWeight: 500, color: T.ink, marginBottom: 10 }}>{title}</h4>
        <p style={{ fontSize: 13, color: T.ink, fontWeight: 500, marginBottom: 8, lineHeight: 1.45 }}>{when}</p>
        <p style={{ fontSize: 13, color: T.inkSoft, marginBottom: 8, lineHeight: 1.5 }}>{does}</p>
        <p style={{ fontSize: 12, color: T.muted, fontStyle: 'italic', marginBottom: 14, lineHeight: 1.5 }}>{who}</p>
        <span className="flex items-center gap-1.5" style={{ fontSize: 12.5, fontWeight: 500, color: tone }}>{cta} <ArrowRight size={13} /></span>
      </div>
    </button>
  );
}

// (legacy) — kept for backward compatibility
function Block({ title, children }) {
  return (
    <div>
      <h3 className="serif" style={{ fontSize: 22, fontWeight: 500, marginBottom: 10 }}>{title}</h3>
      <div style={{ fontSize: 15, color: T.inkSoft, lineHeight: 1.7 }} className="space-y-3">{children}</div>
    </div>
  );
}

setTimeout(() => {
  const loader = document.getElementById('loader');
  if (loader) {
    loader.classList.add('gone');
    setTimeout(() => loader.remove(), 500);
  }
}, 200);
</script>
