const DEFAULT_INTERVENTIONS = [
  { id: 1,  determinant: 1, name: 'Belonging-building architecture', time: 7, cost: 8, depth: 4, definition: 'Deliberate design of roles, spaces, rituals, or responsibilities that create durable belonging, shared identity, and mutual obligation beyond participation in services or events.', examples: 'Includes marae-based roles, collective responsibilities, membership structures, and practices that make people needed. Not general events or hui unless they intentionally confer responsibility or enduring connection.' },
  { id: 2,  determinant: 1, name: 'Responsibility-based roles', time: 6, cost: 7, depth: 3, definition: 'Creation of real, accountable roles for whānau or community members that carry expectation, contribution, and recognition.', examples: 'Includes kaitiaki roles, rangatahi leadership lanes, peer roles. Excludes volunteering without responsibility or one-off participation.' },
  { id: 3,  determinant: 1, name: 'Restorying self-narratives', time: 6, cost: 7, depth: 3, definition: 'Interventions that explicitly support people to reinterpret identity, history, and future possibility in ways that rebuild confidence, aspiration, and agency.', examples: 'Includes narrative, identity-affirming programmes, kaupapa Māori healing approaches. Excludes generic counselling unless narrative/identity change is central.' },
  { id: 4,  determinant: 1, name: 'External belief & affirmation', time: 5, cost: 6, depth: 2, definition: 'Structured affirmation from trusted others that reinforces worth, capability, and expectation of success.', examples: 'Includes mentoring, coaching where belief-holding is explicit. Excludes transactional advice or case management without relational depth.' },
  { id: 5,  determinant: 1, name: 'Aspiration–agency cycles', time: 7, cost: 8, depth: 4, definition: 'Interventions that repeatedly link aspiration to action, feedback, and progress, strengthening follow-through over time.', examples: 'Includes programmes that combine goal-setting, support, and accountability. Excludes single workshops or motivation talks without ongoing cycles.' },
  { id: 6,  determinant: 2, name: 'Access & navigation', time: 3, cost: 4, depth: 2, definition: 'Supports that help people reach, understand, and remain engaged with existing services or systems.', examples: 'Includes navigators, transport support, appointment coordination. Excludes creation of new services (that sits elsewhere).' },
  { id: 7,  determinant: 2, name: 'Reliability & practice redesign', time: 3, cost: 6, depth: 2, definition: 'Changes to internal practices or processes that reduce error, inconsistency, or preventable harm.', examples: 'Includes pathway redesign, standardisation, quality improvement. Excludes frontline delivery unless the focus is system reliability.' },
  { id: 8,  determinant: 2, name: 'Service coordination', time: 5, cost: 5, depth: 5, definition: 'Active alignment of services or organisations to improve continuity, reduce duplication, or smooth transitions.', examples: 'Includes shared plans, integrated hubs. Excludes informal collaboration without shared accountability.' },
  { id: 9,  determinant: 2, name: 'Parallel provision (kaupapa delivery)', time: 4, cost: 7, depth: 6, definition: 'Alternative delivery models created because mainstream systems fail to reach or serve particular groups.', examples: 'Includes iwi-led or kaupapa Māori delivery of state-funded services. Excludes pilots that are simply small-scale versions of mainstream models.' },
  { id: 10, determinant: 2, name: 'Service-level rule changes', time: 6, cost: 8, depth: 3, definition: 'Changes to commissioning, funding rules, governance, or decision rights that shape how services operate.', examples: 'Includes outcomes-based contracts, pooled funding, governance reform. Excludes operational tweaks without rule change.' },
  { id: 11, determinant: 2, name: 'Macroeconomic rules & settings', time: 8, cost: 10, depth: 10, definition: 'Economy-wide policy settings that shape income, security, and work incentives.', examples: 'Includes tax, welfare, wage settings. Typically not controlled by iwi/philanthropy but relevant for advocacy or partnership classification.' },
  { id: 12, determinant: 3, name: 'Housing security', time: 6, cost: 9, depth: 9, definition: 'Investments that increase stability, affordability, or security of housing.', examples: 'Includes social housing, rent subsidies, Housing First. High capex/opex; often requires partnerships.' },
  { id: 13, determinant: 3, name: 'Income security', time: 3, cost: 8, depth: 8, definition: 'Cash or near-cash supports that stabilise household resources.', examples: 'Includes grants, tax credits, income supplements. Excludes in-kind goods unless cash-like and flexible.' },
  { id: 14, determinant: 3, name: 'Energy security', time: 4, cost: 5, depth: 5, definition: 'Interventions that improve warmth, energy affordability, or efficiency.', examples: 'Includes insulation, heating upgrades, energy grants. Often infrastructure + subsidy mix.' },
  { id: 15, determinant: 3, name: 'Digital access', time: 4, cost: 5, depth: 6, definition: 'Provision of connectivity, devices, or digital infrastructure that enables participation.', examples: 'Includes broadband, devices. Excludes skills training (that sits under capability).' },
  { id: 16, determinant: 3, name: 'Financial infrastructure access', time: 4, cost: 5, depth: 4, definition: 'Tools that enable saving, credit, insurance, or financial inclusion.', examples: 'Includes matched savings, low-fee accounts. Excludes one-off grants (income security).' },
  { id: 17, determinant: 3, name: 'Employment access', time: 5, cost: 6, depth: 6, definition: 'Supports that increase attachment to paid work or labour market participation.', examples: 'Includes wage subsidies, job placement. Excludes training unless directly linked to employment.' },
  { id: 18, determinant: 4, name: 'Skills & capability development', time: 6, cost: 6, depth: 5, definition: 'Training or capability building that increases skills, knowledge, or competence over time.', examples: 'Includes vocational training, parenting programmes. Excludes motivation-only or one-off sessions.' },
  { id: 19, determinant: 4, name: 'Behaviour change programmes', time: 4, cost: 4, depth: 3, definition: 'Structured interventions aimed at changing specific behaviours or habits.', examples: 'Includes smoking cessation, budgeting routines. Excludes capability training unless behaviour change is primary aim.' },
  { id: 20, determinant: 4, name: 'Cognitive/motivation interventions', time: 5, cost: 6, depth: 4, definition: 'Interventions that strengthen goal-setting, follow-through, and psychological readiness for change.', examples: 'Includes CBT-informed coaching. Excludes general counselling without action pathways.' },
  { id: 21, determinant: 4, name: 'Coaching & mentoring', time: 5, cost: 6, depth: 6, definition: 'Ongoing, relational support that scaffolds progress through goals or transitions.', examples: 'Includes employment coaching. Excludes navigation-only roles.' },
  { id: 22, determinant: 4, name: 'Incentives & nudges', time: 2, cost: 3, depth: 1, definition: 'Light-touch mechanisms that alter choice architecture or prompt action.', examples: 'Includes reminders, defaults. Excludes intensive support or payments large enough to function as income support.' },
  { id: 23, determinant: 4, name: 'Public health campaigns', time: 4, cost: 4, depth: 7, definition: 'Population-level messaging aimed at shifting awareness or norms.', examples: 'Includes media campaigns. Excludes targeted programmes or services.' },
  { id: 24, determinant: 5, name: 'Provision of essentials (money, food etc)', time: 1, cost: 2, depth: 3, definition: 'Immediate provision of basic goods to stabilise hardship.', examples: 'Includes food parcels, vouchers. Excludes cash transfers intended as income support.' },
  { id: 25, determinant: 5, name: 'Temporary refuge and safety', time: 1, cost: 3, depth: 7, definition: 'Short-term accommodation or safety responses that prevent immediate harm.', examples: 'Includes shelters, refuges. Excludes long-term housing solutions.' },
  { id: 26, determinant: 5, name: 'Crisis response and acute intervention', time: 1, cost: 3, depth: 8, definition: 'Immediate responses to acute health, safety, or wellbeing crises.', examples: 'Includes crisis teams, detox. Excludes ongoing support post-crisis.' },
  { id: 27, determinant: 5, name: 'One off financial shock absorption', time: 1, cost: 4, depth: 3, definition: 'Timely, one-off payments that prevent escalation from discrete shocks.', examples: 'Includes bond arrears, car repairs. Excludes ongoing income supplements.' },
  { id: 28, determinant: 5, name: 'Short-term case holding / triage', time: 2, cost: 3, depth: 4, definition: 'Temporary case management that stabilises risk while pathways are identified.', examples: 'Includes crisis casework. Excludes long-term coaching or navigation.' },
  { id: 29, determinant: 5, name: 'Compassionate response and presence', time: 2, cost: 4, depth: 2, definition: 'Relational support focused on care, grief, or presence rather than outcomes.', examples: 'Includes bereavement support. Often low-visibility but high meaning.' },
  { id: 30, determinant: 5, name: 'Emergency access substitution', time: 1, cost: 3, depth: 2, definition: 'Workarounds that fast-track access where systems fail.', examples: 'Includes advocacy to override delays. Boundary risk: can become permanent workaround if system issues aren\u2019t addressed.' },
];

// ============================================================================
// STORAGE — localStorage wrapped in an async interface
// ============================================================================
const STORAGE_KEY = 'eco-portfolio:current';

const storage = {
  async get(key) {
    try { return localStorage.getItem(key); }
    catch (e) { return null; }
  },
  async set(key, value) {
    try { localStorage.setItem(key, value); }
    catch (e) {}
  },
  async list(prefix) {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(prefix)) keys.push(k);
      }
      return keys;
    } catch (e) { return []; }
  },
  async del(key) {
    try { localStorage.removeItem(key); }
    catch (e) {}
  },
};

const encodeState = (state) => {
  try {
    const json = JSON.stringify(state);
    return btoa(unescape(encodeURIComponent(json)));
  } catch (e) { return ''; }
};
const decodeState = (s) => {
  try {
    return JSON.parse(decodeURIComponent(escape(atob(s))));
  } catch (e) { return null; }
};

// ============================================================================
// MAIN APP
// ============================================================================
function App() {
  const [route, setRoute] = useState('home');
  const [interventions, setInterventions] = useState(DEFAULT_INTERVENTIONS);
  const [ecoMeta, setEcoMeta] = useState({ name: '', definition: '', timeframe: '', completedBy: '', date: '' });
  const [ecoInputs, setEcoInputs] = useState({});
  const [portfolioInputs, setPortfolioInputs] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    (async () => {
      if (window.location.hash && window.location.hash.length > 5) {
        const hash = window.location.hash.replace(/^#s=/, '');
        const decoded = decodeState(hash);
        if (decoded) {
          if (decoded.interventions) setInterventions(decoded.interventions);
          if (decoded.ecoMeta) setEcoMeta(decoded.ecoMeta);
          if (decoded.ecoInputs) setEcoInputs(decoded.ecoInputs);
          if (decoded.portfolioInputs) setPortfolioInputs(decoded.portfolioInputs);
          setLoaded(true);
          showToast('Assessment loaded from shared link');
          return;
        }
      }
      const saved = await storage.get(STORAGE_KEY);
      if (saved) {
        try {
          const d = JSON.parse(saved);
          if (d.interventions) setInterventions(d.interventions);
          if (d.ecoMeta) setEcoMeta(d.ecoMeta);
          if (d.ecoInputs) setEcoInputs(d.ecoInputs);
          if (d.portfolioInputs) setPortfolioInputs(d.portfolioInputs);
        } catch (e) {}
      }
      setLoaded(true);
    })();
  }, []);

  const saveTimer = useRef(null);
  useEffect(() => {
    if (!loaded) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      const payload = JSON.stringify({ interventions, ecoMeta, ecoInputs, portfolioInputs });
      storage.set(STORAGE_KEY, payload);
    }, 600);
    return () => saveTimer.current && clearTimeout(saveTimer.current);
  }, [interventions, ecoMeta, ecoInputs, portfolioInputs, loaded]);

  const showToast = (msg, ms = 2400) => {
    setToast(msg);
    setTimeout(() => setToast(null), ms);
  };

  const updateEcoInput = useCallback((id, field, value) => {
    setEcoInputs(prev => ({ ...prev, [id]: { ...(prev[id] || {}), [field]: value } }));
  }, []);
  const updatePortfolioInput = useCallback((id, value) => {
    setPortfolioInputs(prev => ({ ...prev, [id]: { spend: value } }));
  }, []);

  const resetAll = async () => {
    if (!confirm('Reset everything — interventions, inputs, and saved state — back to defaults?')) return;
    setInterventions(DEFAULT_INTERVENTIONS);
    setEcoMeta({ name: '', definition: '', timeframe: '', completedBy: '', date: '' });
    setEcoInputs({});
    setPortfolioInputs({});
    await storage.del(STORAGE_KEY);
    window.location.hash = '';
    showToast('Reset complete');
  };

  const state = { interventions, ecoMeta, ecoInputs, portfolioInputs };

  return (
    <div style={{ background: T.bone, color: T.ink, minHeight: '100vh' }}>
      <Header route={route} setRoute={setRoute} state={state} showToast={showToast} resetAll={resetAll} />
      <main className="max-w-6xl mx-auto px-5 sm:px-8 pb-24">
        {route === 'home'      && <Home setRoute={setRoute} state={state} />}
        {route === 'ecosystem' && <EcosystemFlow interventions={interventions} ecoMeta={ecoMeta} setEcoMeta={setEcoMeta} ecoInputs={ecoInputs} updateEcoInput={updateEcoInput} setRoute={setRoute} />}
        {route === 'portfolio' && <PortfolioFlow interventions={interventions} portfolioInputs={portfolioInputs} updatePortfolioInput={updatePortfolioInput} setRoute={setRoute} />}
        {route === 'library'   && <Library interventions={interventions} setInterventions={setInterventions} showToast={showToast} />}
        {route === 'about'     && <About />}
      </main>
      {toast && (
        <div className="fixed bottom-6 left-1/2 fade-in" style={{ transform: 'translateX(-50%)', background: T.forest, color: T.bone, padding: '10px 20px', borderRadius: 999, fontSize: 14, boxShadow: '0 8px 24px rgba(0,0,0,0.18)', zIndex: 50 }}>
          {toast}
        </div>
      )}
    </div>
  );
}

          <div style={{ width: 36, height: 36, borderRadius: 8, background: T.forest, color: T.bone, display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Fraunces, serif', fontWeight: 600, fontSize: 18, fontStyle: 'italic' }}>e</div>
          <div className="text-left">
            <div className="serif" style={{ fontSize: 17, lineHeight: 1, fontWeight: 500, letterSpacing: '-0.01em' }}>Ecosystem & Portfolio</div>
            <div style={{ fontSize: 11, color: T.muted, marginTop: 3, letterSpacing: '0.06em', textTransform: 'uppercase' }}>Sense-making tools</div>

          <NavLink active={route==='ecosystem'} onClick={() => setRoute('ecosystem')} icon={<Compass size={15} />}>Ecosystem</NavLink>
          <NavLink active={route==='portfolio'} onClick={() => setRoute('portfolio')} icon={<PieIcon size={15} />}>Portfolio</NavLink>
          <NavLink active={route==='library'} onClick={() => setRoute('library')} icon={<BookOpen size={15} />}>Interventions</NavLink>
          <NavLink active={route==='about'} onClick={() => setRoute('about')} icon={<Info size={15} />}>About</NavLink>
          <div style={{ width: 1, height: 18, background: T.hair, margin: '0 8px' }} />
          <button onClick={() => setShareOpen(true)} className="hover-lift flex items-center gap-1.5"
            style={{ padding: '7px 14px', borderRadius: 6, background: T.forest, color: T.bone, fontSize: 13, fontWeight: 500 }}>
            <Share2 size={14} /> Save & Share

      </div>

function NavLink({ active, onClick, icon, children }) {
  return (
    <button onClick={onClick}
      style={{
        padding: '7px 12px', borderRadius: 6, fontSize: 13.5,
        background: active ? T.parchment : 'transparent',
        color: active ? T.ink : T.inkSoft, fontWeight: active ? 500 : 400,
        display: 'flex', alignItems: 'center', gap: 6
      }}>
      {icon}{children}
    </button>
  );
}

// ============================================================================
// SHARE DIALOG
// ============================================================================
function ShareDialog({ state, onClose, showToast, resetAll }) {
  const [snapName, setSnapName] = useState('');
  const [snapshots, setSnapshots] = useState([]);
  const [shareUrl, setShareUrl] = useState('');

  useEffect(() => {
    (async () => {
      const keys = await storage.list('snapshot:');
      setSnapshots(keys.map(k => k.replace('snapshot:', '')));
    })();
    const enc = encodeState(state);
    const base = window.location.href.split('#')[0];
    setShareUrl(`${base}#s=${enc}`);
  }, []);

  const saveSnapshot = async () => {
    if (!snapName.trim()) return;
    await storage.set(`snapshot:${snapName.trim()}`, JSON.stringify(state));
    const keys = await storage.list('snapshot:');
    setSnapshots(keys.map(k => k.replace('snapshot:', '')));
    setSnapName('');
    showToast('Snapshot saved');
  };

  const loadSnapshot = async (name) => {
    const v = await storage.get(`snapshot:${name}`);
    if (!v) return;
    await storage.set(STORAGE_KEY, v);
    window.location.reload();
  };

  const deleteSnapshot = async (name) => {
    if (!confirm(`Delete snapshot "${name}"?`)) return;
    await storage.del(`snapshot:${name}`);
    setSnapshots(s => s.filter(x => x !== name));
  };

  const copyUrl = async () => {
    try { await navigator.clipboard.writeText(shareUrl); showToast('Shareable link copied'); }
    catch (e) { showToast('Could not copy — select and copy manually'); }
  };

  const exportJson = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'ecosystem-portfolio-assessment.json'; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="fixed inset-0 fade-in" style={{ background: 'rgba(30, 38, 32, 0.45)', zIndex: 50 }} onClick={onClose}>
      <div className="max-w-2xl mx-auto mt-16 fade-up scroll-soft" style={{ background: T.bone, borderRadius: 12, maxHeight: '80vh', overflowY: 'auto' }} onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between p-6 pb-3">
          <h3 className="serif" style={{ fontSize: 22, fontWeight: 500 }}>Save, share, or export</h3>
          <button onClick={onClose} style={{ color: T.muted }}><X size={20} /></button>
        </div>
        <div className="px-6 pb-6 space-y-6">
          <Section title="Shareable link" subtitle="Encodes the whole assessment in the URL. Useful for sending to a colleague or coming back later.">
            <div className="flex gap-2">
              <input readOnly value={shareUrl} className="flex-1 scroll-soft" style={inputStyle({ fontSize: 12, fontFamily: 'ui-monospace, monospace' })} />
              <button onClick={copyUrl} className="flex items-center gap-1.5" style={buttonStyle('primary')}><Copy size={14} /> Copy</button>
            </div>
          </Section>
          <Section title="Named snapshots" subtitle="Saved in this browser. Use snapshots to compare over time, or different scenarios.">
            <div className="flex gap-2 mb-3">
              <input value={snapName} onChange={e => setSnapName(e.target.value)} placeholder="e.g. Te Tai Tokerau, Nov 2025" className="flex-1" style={inputStyle()} />
              <button onClick={saveSnapshot} className="flex items-center gap-1.5" style={buttonStyle('primary')}><Save size={14} /> Save</button>
            </div>
            {snapshots.length === 0 ? (
              <p style={{ color: T.muted, fontSize: 13 }}>No snapshots yet.</p>
            ) : (
              <ul className="space-y-1">
                {snapshots.map(name => (
                  <li key={name} className="flex items-center justify-between gap-3" style={{ padding: '8px 10px', borderRadius: 6, background: T.boneLight, border: `1px solid ${T.hairSoft}` }}>
                    <span style={{ fontSize: 14 }}>{name}</span>
                    <div className="flex gap-1">
                      <button onClick={() => loadSnapshot(name)} style={buttonStyle('ghost', 'sm')}>Load</button>
                      <button onClick={() => deleteSnapshot(name)} style={{...buttonStyle('ghost', 'sm'), color: T.clayDark }}><Trash2 size={13} /></button>
                    </div>
                  </li>
                ))}
              </ul>
            )}
          </Section>
          <Section title="Export & reset">
            <div className="flex gap-2 flex-wrap">
              <button onClick={exportJson} className="flex items-center gap-1.5" style={buttonStyle('secondary')}><Download size={14} /> Export JSON</button>
              <button onClick={resetAll} className="flex items-center gap-1.5" style={{...buttonStyle('secondary'), color: T.clayDark, borderColor: T.clayDark + '33' }}><RotateCcw size={14} /> Reset everything</button>
            </div>
          </Section>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
function Section({ title, subtitle, children }) {
  return (
    <div>
      <div className="serif" style={{ fontSize: 15, fontWeight: 500, color: T.ink, marginBottom: 2 }}>{title}</div>
      {subtitle && <div style={{ fontSize: 13, color: T.muted, marginBottom: 10, lineHeight: 1.5 }}>{subtitle}</div>}
      {children}
    </div>
  );
}

function Card({ children, style }) {
  return (
    <div style={{ background: T.boneLight, borderRadius: 10, padding: 20, border: `1px solid ${T.hairSoft}`, ...style }}>
      {children}
    </div>
  );
}

function StatTile({ label, value, sub, accent }) {
  return (
    <div style={{ background: T.boneLight, border: `1px solid ${T.hairSoft}`, borderRadius: 10, padding: 16 }}>
      <div style={{ fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: T.muted, marginBottom: 6 }}>{label}</div>
      <div className="serif" style={{ fontSize: 32, fontWeight: 500, lineHeight: 1, color: accent || T.ink }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: T.muted, marginTop: 6 }}>{sub}</div>}
    </div>
  );
}

function inputStyle(overrides = {}) {
  return {
    background: T.bone, border: `1px solid ${T.hair}`, borderRadius: 6,
    padding: '8px 12px', fontSize: 14, color: T.ink, width: '100%',
    ...overrides
  };
}

function buttonStyle(kind = 'primary', size = 'md') {
  const sizes = { sm: { padding: '5px 10px', fontSize: 12 }, md: { padding: '8px 14px', fontSize: 13 } };
  const kinds = {
    primary: { background: T.forest, color: T.bone, fontWeight: 500 },
    secondary: { background: T.bone, color: T.ink, border: `1px solid ${T.hair}` },
    ghost: { background: 'transparent', color: T.inkSoft },
  };
  return { borderRadius: 6, display: 'inline-flex', alignItems: 'center', gap: 6, ...sizes[size], ...kinds[kind] };
}

function Home({ setRoute, state }) {
  const ecoCount = Object.values(state.ecoInputs).filter(i => i.reach || i.efficacy || i.count).length;
  const portCount = Object.values(state.portfolioInputs).filter(i => i.spend).length;

  return (
    <div className="fade-up">
      <div className="pt-16 pb-12 max-w-3xl">
        <div style={{ fontSize: 12, letterSpacing: '0.12em', textTransform: 'uppercase', color: T.muted, marginBottom: 18 }}>
          A tool for shared sense-making
        </div>
        <h1 className="serif" style={{ fontSize: 'clamp(40px, 6vw, 64px)', lineHeight: 1.05, fontWeight: 400, letterSpacing: '-0.02em', marginBottom: 24 }}>
          See the shape of <span className="serif-italic" style={{ color: T.clay }}>effort</span>,<br/>
          before deciding where <span className="serif-italic" style={{ color: T.forest }}>yours</span> goes.
        </h1>
        <p style={{ fontSize: 18, color: T.inkSoft, lineHeight: 1.65, maxWidth: 640 }}>
          Two simple tools — one to map what is happening in a rohe, kaupapa, or cohort, and one to surface the patterns in your own portfolio. The value sits less in the data than in the kōrero it provokes.
        </p>
      </div>

      <div className="grid md:grid-cols-2 gap-5 mt-2">
        <ToolCard tone={T.forest} tint="#DCE5DC" icon={<Compass size={20} />} eyebrow="Tool one"
          title="Ecosystem mapping"
          body="See where effort is dense, thin, or absent across a defined ecosystem. Estimate how many initiatives are working in each area, and reflect on their reach and efficacy in this context."
          progress={`${ecoCount} of ${state.interventions.length} interventions touched`}
          cta="Open ecosystem map" onClick={() => setRoute('ecosystem')} />
        <ToolCard tone={T.clay} tint="#EAD3C8" icon={<PieIcon size={20} />} eyebrow="Tool two"
          title="Portfolio balance"
          body="Enter your annual spend across intervention types. The tool surfaces where you are concentrated, what time horizons you are implicitly funding, and where the trade-offs sit."
          progress={`${portCount} of ${state.interventions.length} spend lines entered`}
          cta="Open portfolio view" onClick={() => setRoute('portfolio')} />
      </div>

      <div className="mt-14 pt-10" style={{ borderTop: `1px solid ${T.hairSoft}` }}>
        <div className="grid md:grid-cols-3 gap-10">
          <Principle title="Patterns, not precision">
            You do not need perfect data. The tool is built to surface patterns of effort, not to audit programmes. Disagreement is expected, and useful.
          </Principle>
          <Principle title="Diagnostic, not evaluative">
            Reach and efficacy are subjective judgements, made through lived knowledge. These tools do not rank organisations, prescribe action, or determine what should be funded.
          </Principle>
          <Principle title="A mirror, not a scorecard">
            The charts make trade-offs visible so they can be discussed openly. There is no &ldquo;right&rdquo; ecosystem or portfolio — context, mandate, and values matter.
          </Principle>
        </div>
      </div>
    </div>
  );
}

function ToolCard({ tone, tint, icon, eyebrow, title, body, progress, cta, onClick }) {

    <button onClick={onClick} className="text-left hover-lift" style={{
      background: T.boneLight, borderRadius: 14, padding: 28,
      border: `1px solid ${T.hairSoft}`, position: 'relative', overflow: 'hidden'
    }}>
      <div style={{ position: 'absolute', top: -40, right: -40, width: 180, height: 180, borderRadius: '50%', background: tint, opacity: 0.55 }} />
      <div style={{ position: 'relative' }}>
        <div className="flex items-center gap-2" style={{ color: tone, marginBottom: 18 }}>
          {icon}
          <span style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', fontWeight: 500 }}>{eyebrow}</span>
        </div>
        <h3 className="serif" style={{ fontSize: 28, fontWeight: 500, marginBottom: 10, letterSpacing: '-0.01em' }}>{title}</h3>
        <p style={{ fontSize: 14.5, color: T.inkSoft, lineHeight: 1.6, marginBottom: 18 }}>{body}</p>
        <div className="flex items-center justify-between">
          <span style={{ fontSize: 12, color: T.muted }}>{progress}</span>
          <span className="flex items-center gap-1.5" style={{ fontSize: 13, fontWeight: 500, color: tone }}>{cta} <ArrowRight size={14} /></span>
        </div>
      </div>

}

function Principle({ title, children }) {
  return (
    <div>
      <div className="serif" style={{ fontSize: 17, fontWeight: 500, marginBottom: 8, color: T.ink }}>{title}</div>
      <p style={{ fontSize: 14, color: T.inkSoft, lineHeight: 1.65 }}>{children}</p>
    </div>

}

// ECOSYSTEM FLOW
// ============================================================================
function EcosystemFlow({ interventions, ecoMeta, setEcoMeta, ecoInputs, updateEcoInput, setRoute }) {
  const [step, setStep] = useState('input');
  return (
    <div className="fade-up pt-10">
      <Eyebrow tone={T.forest}>Tool one · Ecosystem mapping</Eyebrow>
      <h2 className="serif" style={{ fontSize: 'clamp(30px, 4vw, 44px)', fontWeight: 400, letterSpacing: '-0.02em', marginBottom: 24 }}>Map the ecosystem</h2>
      <Tabs step={step} setStep={setStep} options={[
        { key: 'setup',   label: 'Setup',   sub: 'Define the kaupapa' },
        { key: 'input',   label: 'Reflect', sub: 'Walk the interventions' },
        { key: 'results', label: 'See',     sub: 'Visuals + discussion signals' },
      ]} />
      {step === 'setup'   && <EcoSetup ecoMeta={ecoMeta} setEcoMeta={setEcoMeta} next={() => setStep('input')} />}
      {step === 'input'   && <EcoInput interventions={interventions} ecoInputs={ecoInputs} updateEcoInput={updateEcoInput} />}
      {step === 'results' && <EcoResults interventions={interventions} ecoInputs={ecoInputs} ecoMeta={ecoMeta} />}
    </div>
  );
}

function Eyebrow({ children, tone }) {
  return <div style={{ fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: tone || T.muted, marginBottom: 14, fontWeight: 500 }}>{children}</div>;
}

function Tabs({ step, setStep, options }) {
  return (
    <div className="flex gap-1 mb-8 flex-wrap" style={{ background: T.parchment, padding: 4, borderRadius: 10, display: 'inline-flex' }}>
      {options.map(o => (
        <button key={o.key} onClick={() => setStep(o.key)}
          style={{
            padding: '8px 16px', borderRadius: 7,
            background: step === o.key ? T.bone : 'transparent',
            color: step === o.key ? T.ink : T.inkSoft,
            fontSize: 13.5, fontWeight: step === o.key ? 500 : 400,
            display: 'flex', alignItems: 'flex-start', gap: 6, flexDirection: 'column', textAlign: 'left'
          }}>
          <span>{o.label}</span>
          <span style={{ fontSize: 11, color: T.muted }}>{o.sub}</span>
        </button>
      ))}
    </div>
  );
}

function EcoSetup({ ecoMeta, setEcoMeta, next }) {
  const set = (k) => (e) => setEcoMeta({ ...ecoMeta, [k]: e.target.value });
  return (
    <Card>
      <p style={{ fontSize: 14, color: T.inkSoft, lineHeight: 1.6, marginBottom: 24, maxWidth: 640 }}>
        Before entering data, agree what ecosystem you are mapping. This might be a rohe, a kaupapa, a population cohort, or a funding environment. Context matters — it helps later readers understand the lens.
      </p>
      <div className="grid md:grid-cols-2 gap-5">
        <Field label="Ecosystem name" sub="A short label">
          <input value={ecoMeta.name} onChange={set('name')} placeholder="e.g. Whangārei whānau wellbeing" style={inputStyle()} />
        </Field>
        <Field label="Timeframe" sub="What window are you considering?">
          <input value={ecoMeta.timeframe} onChange={set('timeframe')} placeholder="e.g. current / last 12 months" style={inputStyle()} />
        </Field>
        <Field label="Definition" sub="What does this ecosystem actually cover?" full>
          <textarea value={ecoMeta.definition} onChange={set('definition')} rows={3}
            placeholder="e.g. Iwi-led and adjacent services supporting rangatahi (15–24) within Te Tai Tokerau"
            style={{ ...inputStyle(), resize: 'vertical' }} />
        </Field>
        <Field label="Who completed this">
          <input value={ecoMeta.completedBy} onChange={set('completedBy')} placeholder="e.g. Strategy hui, 4 attendees" style={inputStyle()} />
        </Field>
        <Field label="Date">
          <input value={ecoMeta.date} onChange={set('date')} placeholder="e.g. 17 May 2026" style={inputStyle()} />
        </Field>
      </div>
      <div className="mt-6 flex justify-end">
        <button onClick={next} className="flex items-center gap-1.5" style={buttonStyle('primary')}>Continue to inputs <ArrowRight size={14} /></button>
      </div>
    </Card>
  );
}

function Field({ label, sub, children, full }) {
  return (
    <label style={{ display: 'block', gridColumn: full ? '1 / -1' : undefined }}>
      <div style={{ fontSize: 13, fontWeight: 500, color: T.ink, marginBottom: 4 }}>{label}</div>
      {sub && <div style={{ fontSize: 12, color: T.muted, marginBottom: 8 }}>{sub}</div>}
      {children}
    </label>
  );
}

function EcoInput({ interventions, ecoInputs, updateEcoInput }) {
  const [open, setOpen] = useState({ 1: true, 2: false, 3: false, 4: false, 5: false });
  const grouped = useMemo(() => {
    const g = { 1: [], 2: [], 3: [], 4: [], 5: [] };
    interventions.forEach(i => { if (g[i.determinant]) g[i.determinant].push(i); });
    return g;
  }, [interventions]);

  return (
    <div className="space-y-3">
      <p style={{ fontSize: 14, color: T.inkSoft, lineHeight: 1.6, marginBottom: 8, maxWidth: 720 }}>
        For each intervention type, reflect on what is happening in this ecosystem. Rough estimates are fine — the tool is designed to surface patterns, not reward precision. Skip rows where you have no view.
      </p>
      {Object.entries(grouped).map(([dId, items]) => {
        const d = DETERMINANTS[dId];
        if (!d) return null;
        const expanded = open[dId];
        const filled = items.filter(i => {
          const v = ecoInputs[i.id];
          return v && (v.reach || v.efficacy || v.count);
        }).length;
        return (
          <div key={dId} style={{ background: T.boneLight, border: `1px solid ${T.hairSoft}`, borderRadius: 10, overflow: 'hidden' }}>
            <button onClick={() => setOpen(o => ({ ...o, [dId]: !o[dId] }))}
              className="w-full flex items-center justify-between p-5 text-left"
              style={{ background: expanded ? T.parchment : 'transparent' }}>
              <div className="flex items-center gap-3">
                <div style={{ width: 8, height: 8, borderRadius: '50%', background: d.color }} />
                <div>
                  <div className="serif" style={{ fontSize: 18, fontWeight: 500 }}>{d.name}</div>
                  <div style={{ fontSize: 12, color: T.muted, marginTop: 2 }}>{d.subtitle}</div>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <span style={{ fontSize: 12, color: T.muted }}>{filled} / {items.length}</span>
                {expanded ? <ChevronDown size={18} color={T.muted} /> : <ChevronRight size={18} color={T.muted} />}
              </div>
            </button>
            {expanded && (
              <div className="fade-in" style={{ padding: '8px 8px 20px' }}>
                {items.map(it => (
                  <InterventionRow key={it.id} it={it} input={ecoInputs[it.id] || {}} update={updateEcoInput} />
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function InterventionRow({ it, input, update }) {
  const [expanded, setExpanded] = useState(false);
  const d = DETERMINANTS[it.determinant];
  if (!d) return null;
  return (
    <div style={{ borderRadius: 8, padding: '12px 14px', marginTop: 4 }}>
      <div className="flex items-start gap-3 flex-wrap">
        <button onClick={() => setExpanded(!expanded)} className="flex-1 text-left flex items-start gap-2" style={{ minWidth: 200 }}>
          <span style={{ width: 24, height: 24, borderRadius: 5, background: d.tint, color: d.color, fontSize: 11, fontWeight: 600, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 1 }}>{it.id}</span>
          <span>
            <div style={{ fontSize: 14, fontWeight: 500, lineHeight: 1.35 }}>{it.name}</div>
            <div style={{ fontSize: 11, color: T.muted, marginTop: 2, display: 'flex', alignItems: 'center', gap: 4 }}>
              {expanded ? <EyeOff size={11} /> : <Eye size={11} />}
              {expanded ? 'Hide definition' : 'Definition & boundaries'}
            </div>
          </span>
        </button>
        <div className="flex items-center gap-2 flex-wrap">
          <NumberInput value={input.count} onChange={v => update(it.id, 'count', v)} placeholder="# of initiatives" />
          <SelectInput value={input.reach || ''} onChange={v => update(it.id, 'reach', v)} options={REACH_LEVELS} placeholder="Reach" />
          <SelectInput value={input.efficacy || ''} onChange={v => update(it.id, 'efficacy', v)} options={EFFICACY_LEVELS} placeholder="Efficacy" />
        </div>
      </div>
      {expanded && (
        <div className="fade-in mt-3 grid md:grid-cols-2 gap-4" style={{ paddingLeft: 32, paddingTop: 8, paddingBottom: 4, borderTop: `1px dashed ${T.hairSoft}` }}>
          <div>
            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: T.muted, marginBottom: 4, marginTop: 8 }}>What counts here</div>
            <p style={{ fontSize: 13, color: T.inkSoft, lineHeight: 1.55 }}>{it.definition}</p>
          </div>
          <div>
            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: T.muted, marginBottom: 4, marginTop: 8 }}>Examples & boundaries</div>
            <p style={{ fontSize: 13, color: T.inkSoft, lineHeight: 1.55 }}>{it.examples}</p>
          </div>
          <div style={{ gridColumn: '1 / -1' }}>
            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', color: T.muted, marginBottom: 4, marginTop: 4 }}>Notes (optional)</div>
            <textarea value={input.notes || ''} onChange={e => update(it.id, 'notes', e.target.value)} rows={2}
              placeholder="Examples that shaped your judgement, uncertainty, disagreement, gaps in insight…"
              style={{ ...inputStyle({ fontSize: 13 }), resize: 'vertical' }} />
          </div>
        </div>
      )}
    </div>
  );
}

function NumberInput({ value, onChange, placeholder }) {
  return (
    <input type="number" min="0" value={value ?? ''} onChange={e => onChange(e.target.value === '' ? null : Number(e.target.value))}
      placeholder={placeholder} style={inputStyle({ width: 100, fontSize: 13, padding: '6px 10px' })} />
  );
}

function SelectInput({ value, onChange, options, placeholder }) {
  return (
    <select value={value} onChange={e => onChange(e.target.value || null)}
      style={inputStyle({ width: 110, fontSize: 13, padding: '6px 26px 6px 10px', cursor: 'pointer' })}>
      <option value="">{placeholder}</option>
      {options.map(o => <option key={o} value={o}>{o}</option>)}
    </select>
  );
}

function EcoResults({ interventions, ecoInputs, ecoMeta }) {
  const stats = useMemo(() => {
    const items = interventions.map(i => {
      const v = ecoInputs[i.id] || {};
      return { ...i,
        count: typeof v.count === 'number' ? v.count : null,
        reach: v.reach || null, efficacy: v.efficacy || null, notes: v.notes || ''
      };
    });
    const assessed = items.filter(i => i.reach && i.efficacy);
    const withCount = items.filter(i => typeof i.count === 'number');
    const totalInit = withCount.reduce((s, i) => s + (i.count || 0), 0);
    const withNotes = items.filter(i => i.notes && i.notes.trim()).length;

    const matrix = {};
    REACH_LEVELS.forEach(r => { matrix[r] = {}; EFFICACY_LEVELS.forEach(e => matrix[r][e] = []); });
    assessed.forEach(i => matrix[i.reach][i.efficacy].push(i));

    const signals = {
      highReachLowEfficacy: assessed.filter(i => i.reach === 'High' && i.efficacy === 'Low'),
      lowReachHighEfficacy: assessed.filter(i => i.reach === 'Low' && i.efficacy === 'High'),
      gaps: items.filter(i => (i.count === 0 || i.count === null) && i.reach === 'Low'),
      concentration: items.filter(i => (i.count || 0) >= 5 && i.reach === 'High'),
      mixed: assessed.filter(i =>
        (i.reach === 'High' && i.efficacy === 'Low') ||
        (i.reach === 'Low'  && i.efficacy === 'High')
      ),
    };

    return { items, assessed, withCount, totalInit, withNotes, matrix, signals };
  }, [interventions, ecoInputs]);

  const anyData = stats.assessed.length > 0 || stats.totalInit > 0;
  if (!anyData) return <EmptyState>Start in the <strong>Reflect</strong> tab. As you enter reach and efficacy judgements, this view will fill in with the patterns.</EmptyState>;

  return (
    <div className="space-y-8 fade-up">
      {ecoMeta.name && (
        <div style={{ padding: '14px 18px', background: T.parchment, borderRadius: 10, fontSize: 13.5 }}>
          <span className="serif-italic" style={{ color: T.muted, marginRight: 8 }}>You are looking at:</span>
          <strong>{ecoMeta.name}</strong>
          {ecoMeta.timeframe && <span style={{ color: T.muted }}> · {ecoMeta.timeframe}</span>}
          {ecoMeta.completedBy && <span style={{ color: T.muted }}> · by {ecoMeta.completedBy}</span>}
        </div>
      )}

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <StatTile label="Interventions mapped" value={stats.assessed.length} sub={`of ${interventions.length}`} />
        <StatTile label="Total initiatives" value={stats.totalInit} sub="across the ecosystem" />
        <StatTile label="With notes" value={stats.withNotes} sub="captured reflections" />
        <StatTile label="Not yet assessed" value={interventions.length - stats.assessed.length} sub="rows still to walk" />
      </div>

      <Card>
        <div className="flex items-center justify-between flex-wrap gap-2 mb-2">
          <h3 className="serif" style={{ fontSize: 20, fontWeight: 500 }}>Ecosystem map</h3>
          <div style={{ fontSize: 12, color: T.muted }}>Bubble size = number of initiatives · Colour = determinant</div>
        </div>
        <p style={{ fontSize: 13, color: T.inkSoft, lineHeight: 1.5, marginBottom: 12 }}>
          Each bubble is one intervention type, positioned by reach (across) and efficacy (up). Top-right is dense, working effort. Bottom-right is high reach but weak impact. Top-left is strong work that is reaching few.
        </p>
        <EcosystemBubble items={stats.assessed} />
        <DeterminantLegend />
      </Card>

      <div className="grid lg:grid-cols-2 gap-5">
        <Card>
          <h3 className="serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 2 }}>Reach × Efficacy distribution</h3>
          <p style={{ fontSize: 13, color: T.muted, marginBottom: 16 }}>How many interventions sit in each quadrant?</p>
          <ReachEfficacyMatrix matrix={stats.matrix} />
        </Card>
        <Card>
          <h3 className="serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 2 }}>Discussion signals</h3>
          <p style={{ fontSize: 13, color: T.muted, marginBottom: 16 }}>Not conclusions — prompts for the kōrero.</p>
          <SignalsList signals={stats.signals} />
        </Card>
      </div>

      {stats.items.some(i => i.notes && i.notes.trim()) && (
        <Card>
          <h3 className="serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 14 }}>Notes captured</h3>
          <div className="space-y-3">
            {stats.items.filter(i => i.notes && i.notes.trim()).map(i => {
              const d = DETERMINANTS[i.determinant];
              if (!d) return null;
              return (
                <div key={i.id} style={{ borderLeft: `3px solid ${d.color}`, padding: '4px 14px' }}>
                  <div style={{ fontSize: 13, fontWeight: 500 }}>{i.name}</div>
                  <div style={{ fontSize: 13, color: T.inkSoft, lineHeight: 1.55, marginTop: 4 }}>{i.notes}</div>
                </div>
              );
            })}
          </div>
        </Card>
      )}
    </div>
  );
}

function EmptyState({ children }) {
  return (
    <Card>
      <div className="serif-italic" style={{ fontSize: 18, color: T.muted, lineHeight: 1.5, padding: '32px 0', textAlign: 'center' }}>{children}</div>
    </Card>
  );
}

function EcosystemBubble({ items }) {
  const data = useMemo(() => {
    const buckets = {};
    return items.map(i => {
      const key = `${i.reach}-${i.efficacy}`;
      buckets[key] = (buckets[key] || 0) + 1;
      const k = buckets[key];
      const ang = k * 1.7;
      const rad = k === 1 ? 0 : 0.18 * Math.sqrt(k);
      const d = DETERMINANTS[i.determinant];
      return {
        x: REACH_SCORE[i.reach] + Math.cos(ang) * rad,
        y: EFFICACY_SCORE[i.efficacy] + Math.sin(ang) * rad,
        z: Math.max(8, ((i.count || 1) + 4) * 14),
        count: i.count || 0, name: i.name, id: i.id,
        color: d ? d.color : T.muted,
        determinant: d ? d.name : 'Unknown',
      };
    });
  }, [items]);

  return (
    <div style={{ height: 380, marginTop: 8 }}>
      <ResponsiveContainer width="100%" height="100%">
        <ScatterChart margin={{ top: 16, right: 24, bottom: 36, left: 24 }}>
          <CartesianGrid stroke={T.hair} strokeDasharray="2 4" />
          <XAxis type="number" dataKey="x" domain={[0.5, 3.5]} ticks={[1,2,3]} tickFormatter={t => REACH_LEVELS[t-1] || ''}
            tick={{ fill: T.muted, fontSize: 12 }} axisLine={{ stroke: T.hair }} tickLine={{ stroke: T.hair }}
            label={{ value: 'Reach →', position: 'bottom', offset: 12, fill: T.inkSoft, fontSize: 13, fontStyle: 'italic' }} />
          <YAxis type="number" dataKey="y" domain={[0.5, 3.5]} ticks={[1,2,3]} tickFormatter={t => EFFICACY_LEVELS[t-1] || ''}
            tick={{ fill: T.muted, fontSize: 12 }} axisLine={{ stroke: T.hair }} tickLine={{ stroke: T.hair }}
            label={{ value: 'Efficacy →', angle: -90, position: 'insideLeft', offset: -6, fill: T.inkSoft, fontSize: 13, fontStyle: 'italic' }} />
          <ZAxis dataKey="z" range={[40, 1400]} />
          <Tooltip content={<BubbleTooltip />} cursor={{ stroke: T.hair, strokeDasharray: '3 3' }} />
          <ReferenceLine x={2} stroke={T.hair} strokeDasharray="3 3" />
          <ReferenceLine y={2} stroke={T.hair} strokeDasharray="3 3" />
          <Scatter data={data}>
            {data.map((d, idx) => (
              <Cell key={idx} fill={d.color} fillOpacity={0.55} stroke={d.color} strokeWidth={1.5} />
            ))}
            <LabelList dataKey="id" position="center" fill={T.bone} style={{ fontSize: 11, fontWeight: 600 }} />
          </Scatter>
        </ScatterChart>
      </ResponsiveContainer>
    </div>
  );
}

function BubbleTooltip({ active, payload }) {
  if (!active || !payload || !payload.length) return null;
  const p = payload[0].payload;
  return (
    <div style={{ background: T.boneLight, border: `1px solid ${T.hair}`, borderRadius: 8, padding: '10px 12px', fontSize: 12, boxShadow: '0 4px 16px rgba(0,0,0,0.08)' }}>
      <div style={{ fontWeight: 600, marginBottom: 2 }}><span style={{ color: p.color }}>●</span> {p.name}</div>
      <div style={{ color: T.muted }}>{p.determinant} · {p.count} initiative{p.count === 1 ? '' : 's'}</div>
    </div>
  );
}

function DeterminantLegend() {
  return (
    <div className="flex flex-wrap gap-3 mt-4 pt-3" style={{ borderTop: `1px dashed ${T.hairSoft}` }}>
      {Object.values(DETERMINANTS).map(d => (
        <div key={d.name} className="flex items-center gap-1.5" style={{ fontSize: 12, color: T.inkSoft }}>
          <span style={{ width: 10, height: 10, borderRadius: '50%', background: d.color }} />
          {d.name}
        </div>
      ))}
    </div>
  );
}

function ReachEfficacyMatrix({ matrix }) {
  const reaches = ['High', 'Medium', 'Low'];
  const effs = ['Low', 'Medium', 'High'];
  return (
    <div>
      <div style={{ display: 'grid', gridTemplateColumns: '60px 1fr 1fr 1fr', gap: 6 }}>
        <div></div>
        {effs.map(e => <div key={e} style={{ textAlign: 'center', fontSize: 11, color: T.muted, textTransform: 'uppercase', letterSpacing: '0.06em' }}>{e} efficacy</div>)}
        {reaches.map(r => (
          <Fragment key={r}>
            <div style={{ fontSize: 11, color: T.muted, textTransform: 'uppercase', letterSpacing: '0.06em', alignSelf: 'center', textAlign: 'right', paddingRight: 4 }}>{r} reach</div>
            {effs.map(e => {
              const cell = matrix[r][e];
              const n = cell.length;
              const intensity = Math.min(1, n / 6);
              return (
                <div key={r+e} title={cell.map(c=>c.name).join('\n')}
                  style={{
                    background: `rgba(42, 64, 52, ${0.05 + 0.55 * intensity})`,
                    border: `1px solid ${T.hairSoft}`,
                    borderRadius: 6, padding: 12, minHeight: 64,
                    display: 'flex', flexDirection: 'column', justifyContent: 'space-between'
                  }}>
                  <div className="serif" style={{ fontSize: 24, fontWeight: 500, color: intensity > 0.4 ? T.bone : T.ink }}>{n}</div>
                  <div style={{ fontSize: 10, color: intensity > 0.4 ? T.bone : T.muted, opacity: 0.85 }}>
                    {cell.slice(0, 2).map(c => c.id).join(' · ')}{cell.length > 2 && ` · +${cell.length-2}`}
                  </div>
                </div>
              );
            })}
          </Fragment>
        ))}
      </div>
    </div>
  );
}

function SignalsList({ signals }) {
  const rows = [
    { key: 'highReachLowEfficacy', label: 'High reach + Low efficacy', hint: 'a lot of activity, little change', items: signals.highReachLowEfficacy, tone: T.clay },
    { key: 'lowReachHighEfficacy', label: 'Low reach + High efficacy', hint: 'strong work that could be amplified',  items: signals.lowReachHighEfficacy, tone: T.forest },
    { key: 'gaps',                 label: 'Potential gaps',             hint: 'low count + low reach',                items: signals.gaps,                tone: T.slate },
    { key: 'concentration',        label: 'Concentrated effort',        hint: 'high count + high reach',              items: signals.concentration,       tone: T.ochre },
    { key: 'mixed',                label: 'Mixed signals',              hint: 'high one axis, low the other',         items: signals.mixed,               tone: T.muted },
  ];
  return (
    <div className="space-y-2">
      {rows.map(r => (
        <div key={r.key} style={{ padding: '12px 14px', background: T.bone, borderRadius: 8, border: `1px solid ${T.hairSoft}` }}>
          <div className="flex items-center justify-between gap-3">
            <div>
              <div style={{ fontSize: 13.5, fontWeight: 500 }}>{r.label}</div>
              <div style={{ fontSize: 12, color: T.muted, fontStyle: 'italic' }}>{r.hint}</div>
            </div>
            <div className="serif" style={{ fontSize: 24, fontWeight: 500, color: r.tone }}>{r.items.length}</div>
          </div>
          {r.items.length > 0 && (
            <div style={{ fontSize: 12, color: T.inkSoft, marginTop: 8, lineHeight: 1.5 }}>
              {r.items.slice(0, 4).map(i => i.name).join(' · ')}{r.items.length > 4 && ` · +${r.items.length - 4} more`}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function PortfolioInput({ interventions, portfolioInputs, updatePortfolioInput }) {
  const [open, setOpen] = useState({ 1: true, 2: true, 3: true, 4: true, 5: true });
  const grouped = useMemo(() => {
    const g = { 1: [], 2: [], 3: [], 4: [], 5: [] };
    interventions.forEach(i => { if (g[i.determinant]) g[i.determinant].push(i); });
    return g;
  }, [interventions]);
  const total = useMemo(() => Object.values(portfolioInputs).reduce((s, v) => s + (Number(v?.spend) || 0), 0), [portfolioInputs]);

  return (
    <div>
      <Card style={{ marginBottom: 16, background: T.parchment }}>

            <div style={{ fontSize: 12, textTransform: 'uppercase', letterSpacing: '0.08em', color: T.muted }}>Total annual spend entered</div>
            <div className="serif" style={{ fontSize: 32, fontWeight: 500, color: T.ink }}>${total.toLocaleString()}</div>
          </div>
          <p style={{ fontSize: 13, color: T.inkSoft, maxWidth: 380, lineHeight: 1.55, fontStyle: 'italic' }}>

          </p>

      <div className="space-y-3">
        {Object.entries(grouped).map(([dId, items]) => {
          const d = DETERMINANTS[dId];
          if (!d) return null;
          const subtotal = items.reduce((s, i) => s + (Number(portfolioInputs[i.id]?.spend) || 0), 0);
          const filled = items.filter(i => Number(portfolioInputs[i.id]?.spend) > 0).length;
          const expanded = open[dId];
          return (
            <div key={dId} style={{ background: T.boneLight, border: `1px solid ${T.hairSoft}`, borderRadius: 10, overflow: 'hidden' }}>
              <button onClick={() => setOpen(o => ({ ...o, [dId]: !o[dId] }))}
                className="w-full flex items-center justify-between p-5 text-left"
                style={{ background: expanded ? T.parchment : 'transparent' }}>
                <div className="flex items-center gap-3">
                  <div style={{ width: 8, height: 8, borderRadius: '50%', background: d.color }} />
                  <div>
                    <div className="serif" style={{ fontSize: 18, fontWeight: 500 }}>{d.name}</div>
                    <div style={{ fontSize: 12, color: T.muted, marginTop: 2 }}>{filled} of {items.length} lines · ${subtotal.toLocaleString()}</div>
                  </div>
                </div>

              </button>
              {expanded && (
                <div className="fade-in" style={{ padding: '8px 16px 16px' }}>
                  {items.map(it => {
                    const v = portfolioInputs[it.id]?.spend;
                    return (
                      <div key={it.id} className="flex items-center gap-3 flex-wrap py-2" style={{ borderBottom: `1px dashed ${T.hairSoft}` }}>
                        <span style={{ width: 24, height: 24, borderRadius: 5, background: d.tint, color: d.color, fontSize: 11, fontWeight: 600, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{it.id}</span>
                        <span className="flex-1" style={{ fontSize: 14, minWidth: 180 }}>{it.name}</span>
                        <span style={{ fontSize: 11, color: T.muted, marginRight: 8 }} title={`Time:${it.time}/10 · Cost:${it.cost}/10 · Depth:${it.depth}/10`}>
                          T·{it.time} · C·{it.cost} · D·{it.depth}
                        </span>
                        <div style={{ position: 'relative' }}>
                          <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', color: T.muted, fontSize: 13 }}>$</span>
                          <input type="number" min="0" value={v ?? ''}
                            onChange={e => updatePortfolioInput(it.id, e.target.value === '' ? null : Number(e.target.value))}

          );
        })}
      </div>
    </div>

// PORTFOLIO RESULTS
// ============================================================================
function PortfolioResults({ interventions, portfolioInputs }) {
  const data = useMemo(() => {
    const items = interventions.map(i => ({ ...i, spend: Number(portfolioInputs[i.id]?.spend) || 0 })).filter(i => i.spend > 0);
    const total = items.reduce((s, i) => s + i.spend, 0);

    const byDet = Object.values(DETERMINANTS).map(d => {
      const dItems = items.filter(i => DETERMINANTS[i.determinant] && DETERMINANTS[i.determinant].name === d.name);
      const spend = dItems.reduce((s, i) => s + i.spend, 0);
      return { name: d.name, short: d.short, spend, color: d.color, share: total ? spend / total : 0, count: dItems.length };
    }).filter(d => d.spend > 0).sort((a,b) => b.spend - a.spend);

    const horizonOf = (t) => t <= 3 ? 'Short (≤3)' : t <= 7 ? 'Medium (4–7)' : 'Long (8–10)';
    const byHorizon = ['Short (≤3)', 'Medium (4–7)', 'Long (8–10)'].map(label => {
      const hItems = items.filter(i => horizonOf(i.time) === label);
      const spend = hItems.reduce((s, i) => s + i.spend, 0);
      return { name: label, spend, share: total ? spend / total : 0 };
    });

    const depthOf = (d) => d <= 3 ? 'Shallow (≤3)' : d <= 6 ? 'Moderate (4–6)' : 'Deep (7–10)';
    const byDepth = ['Shallow (≤3)', 'Moderate (4–6)', 'Deep (7–10)'].map(label => {
      const dItems = items.filter(i => depthOf(i.depth) === label);
      const spend = dItems.reduce((s, i) => s + i.spend, 0);
      return { name: label, spend, share: total ? spend / total : 0 };
    });

    const frontier = items.map(i => {
      const d = DETERMINANTS[i.determinant];
      return {
        x: i.time, y: i.depth,
        z: Math.max(50, Math.sqrt(i.spend) * 4),
        spend: i.spend, name: i.name, id: i.id,
        color: d ? d.color : T.muted, determinant: d ? d.name : 'Unknown',
      };
    });

    const top = [...items].sort((a,b) => b.spend - a.spend).slice(0, 5);
    return { items, total, byDet, byHorizon, byDepth, frontier, top };
  }, [interventions, portfolioInputs]);

  if (data.items.length === 0) return <EmptyState>Enter at least one spend figure in the <strong>Enter spend</strong> tab. As you do, this view will fill in with the patterns.</EmptyState>;

  return (
    <div className="space-y-8 fade-up">
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <StatTile label="Total annual spend" value={`$${data.total.toLocaleString()}`} />
        <StatTile label="Interventions funded" value={`${data.items.length}`} sub={`of ${interventions.length}`} />
        <StatTile label="Determinants touched" value={data.byDet.length} sub={`of ${Object.keys(DETERMINANTS).length}`} />
        <StatTile label="Concentration" value={data.byDet[0] ? `${Math.round(data.byDet[0].share * 100)}%` : '—'} sub={data.byDet[0] ? `in ${data.byDet[0].short}` : ''} accent={data.byDet[0]?.color} />
      </div>

      <div className="grid lg:grid-cols-2 gap-5">
        <Card>
          <h3 className="serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 2 }}>Balance across determinants</h3>
          <p style={{ fontSize: 13, color: T.muted, marginBottom: 16 }}>Where your spend is concentrated — and where it isn’t.</p>
          <DeterminantBalance data={data.byDet} total={data.total} />
        </Card>
        <Card>
          <h3 className="serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 2 }}>Cost–impact frontier</h3>
          <p style={{ fontSize: 13, color: T.muted, marginBottom: 16 }}>Time to impact (across) vs. depth of change (up). Bubble size = your spend.</p>
          <Frontier data={data.frontier} />
        </Card>
      </div>

      <div className="grid lg:grid-cols-2 gap-5">
        <Card>
          <h3 className="serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 2 }}>Time horizon mix</h3>
          <p style={{ fontSize: 13, color: T.muted, marginBottom: 16 }}>What you are implicitly prioritising in time.</p>
          <HorizontalBars data={data.byHorizon} total={data.total} color={T.forest} />
        </Card>
        <Card>
          <h3 className="serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 2 }}>Depth of change mix</h3>
          <p style={{ fontSize: 13, color: T.muted, marginBottom: 16 }}>What kinds of change your spend supports.</p>
          <HorizontalBars data={data.byDepth} total={data.total} color={T.clay} />
        </Card>
      </div>

      <Card>
        <h3 className="serif" style={{ fontSize: 20, fontWeight: 500, marginBottom: 14 }}>Where the most money flows</h3>
        <div className="space-y-2">
          {data.top.map((i, idx) => {
            const d = DETERMINANTS[i.determinant];
            const pct = data.total ? (i.spend / data.total) * 100 : 0;
            return (
              <div key={i.id} className="flex items-center gap-3">
                <span style={{ width: 22, color: T.muted, fontSize: 12, fontVariantNumeric: 'tabular-nums' }}>{idx+1}</span>
                <span className="flex-1" style={{ fontSize: 14 }}>{i.name}</span>
                <div style={{ width: 220, background: T.parchment, borderRadius: 4, height: 8, overflow: 'hidden' }}>
                  <div style={{ background: d ? d.color : T.muted, height: '100%', width: `${pct}%` }} />
                </div>
                <span style={{ width: 130, textAlign: 'right', fontSize: 13, fontVariantNumeric: 'tabular-nums' }}>${i.spend.toLocaleString()}</span>
                <span style={{ width: 50, textAlign: 'right', fontSize: 12, color: T.muted, fontVariantNumeric: 'tabular-nums' }}>{pct.toFixed(1)}%</span>
              </div>
            );
          })}
        </div>
      </Card>

      <Card style={{ background: T.parchment, border: 'none' }}>
        <div className="serif-italic" style={{ fontSize: 16, color: T.inkSoft, lineHeight: 1.6 }}>
          A mirror, not a scorecard. Does this pattern reflect your intent? Where are you over- or under-exposed? What risks are you holding — or avoiding — through this mix?
        </div>
      </Card>
    </div>
  );
}

function DeterminantBalance({ data, total }) {
  return (
    <div>
      <div style={{ height: 200 }}>
        <ResponsiveContainer width="100%" height="100%">
          <PieChart>
            <Pie data={data} dataKey="spend" nameKey="name" innerRadius={50} outerRadius={90} paddingAngle={2}>
              {data.map((d, i) => <Cell key={i} fill={d.color} stroke={T.bone} strokeWidth={2} />)}
            </Pie>
            <Tooltip content={({ active, payload }) => {
              if (!active || !payload?.length) return null;
              const p = payload[0].payload;
              return (
                <div style={{ background: T.boneLight, border: `1px solid ${T.hair}`, borderRadius: 8, padding: '8px 12px', fontSize: 12 }}>
                  <div style={{ fontWeight: 600 }}><span style={{ color: p.color }}>●</span> {p.name}</div>
                  <div style={{ color: T.muted }}>${p.spend.toLocaleString()} · {(p.share * 100).toFixed(1)}%</div>
                </div>
              );
            }} />
          </PieChart>
        </ResponsiveContainer>
      </div>
      <div className="space-y-1.5 mt-3">
        {data.map(d => (
          <div key={d.name} className="flex items-center gap-2" style={{ fontSize: 13 }}>
            <span style={{ width: 10, height: 10, borderRadius: '50%', background: d.color }} />
            <span className="flex-1">{d.name}</span>
            <span style={{ fontVariantNumeric: 'tabular-nums', color: T.muted }}>${d.spend.toLocaleString()}</span>
            <span style={{ fontVariantNumeric: 'tabular-nums', width: 50, textAlign: 'right' }}>{(d.share * 100).toFixed(1)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function Frontier({ data }) {
  return (
    <div>
      <div style={{ height: 280 }}>
        <ResponsiveContainer width="100%" height="100%">
          <ScatterChart margin={{ top: 16, right: 24, bottom: 36, left: 24 }}>
            <CartesianGrid stroke={T.hair} strokeDasharray="2 4" />
            <XAxis type="number" dataKey="x" domain={[0, 10]} tick={{ fill: T.muted, fontSize: 11 }} axisLine={{ stroke: T.hair }} tickLine={{ stroke: T.hair }}
              label={{ value: 'Time to impact →', position: 'bottom', offset: 8, fill: T.inkSoft, fontSize: 12, fontStyle: 'italic' }} />
            <YAxis type="number" dataKey="y" domain={[0, 10]} tick={{ fill: T.muted, fontSize: 11 }} axisLine={{ stroke: T.hair }} tickLine={{ stroke: T.hair }}
              label={{ value: 'Depth →', angle: -90, position: 'insideLeft', offset: 0, fill: T.inkSoft, fontSize: 12, fontStyle: 'italic' }} />
            <ZAxis dataKey="z" range={[40, 1200]} />
            <Tooltip content={({ active, payload }) => {
              if (!active || !payload?.length) return null;
              const p = payload[0].payload;
              return (
                <div style={{ background: T.boneLight, border: `1px solid ${T.hair}`, borderRadius: 8, padding: '8px 12px', fontSize: 12 }}>
                  <div style={{ fontWeight: 600 }}><span style={{ color: p.color }}>●</span> {p.name}</div>
                  <div style={{ color: T.muted }}>{p.determinant} · ${p.spend.toLocaleString()}</div>
                  <div style={{ color: T.muted }}>Time {p.x}/10 · Depth {p.y}/10</div>
                </div>
              );
            }} cursor={{ stroke: T.hair, strokeDasharray: '3 3' }} />
            <ReferenceLine x={5} stroke={T.hair} strokeDasharray="3 3" />
            <ReferenceLine y={5} stroke={T.hair} strokeDasharray="3 3" />
            <Scatter data={data}>
              {data.map((d, idx) => (
                <Cell key={idx} fill={d.color} fillOpacity={0.55} stroke={d.color} strokeWidth={1.5} />
              ))}
              <LabelList dataKey="id" position="center" fill={T.bone} style={{ fontSize: 11, fontWeight: 600 }} />
            </Scatter>
          </ScatterChart>
        </ResponsiveContainer>
      </div>
      <div style={{ fontSize: 11, color: T.muted, marginTop: 4, fontStyle: 'italic' }}>
        Bottom-left: fast, shallow change · Top-right: slow, deep change. Where does your money sit?
      </div>
    </div>
  );
}

function HorizontalBars({ data, total, color }) {
  return (
    <div className="space-y-3">
      {data.map(d => {
        const pct = total ? (d.spend / total) * 100 : 0;
        return (
          <div key={d.name}>
            <div className="flex items-center justify-between mb-1.5" style={{ fontSize: 13 }}>
              <span>{d.name}</span>
              <span style={{ color: T.muted, fontVariantNumeric: 'tabular-nums' }}>${d.spend.toLocaleString()} · {pct.toFixed(1)}%</span>
            </div>
            <div style={{ background: T.parchment, borderRadius: 4, height: 10, overflow: 'hidden' }}>
              <div style={{ background: color, height: '100%', width: `${pct}%`, transition: 'width 600ms ease-out' }} />
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ============================================================================
// LIBRARY
// ============================================================================
function Library({ interventions, setInterventions, showToast }) {
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(false);

  const startEdit = (it) => setEditing({ ...it });
  const saveEdit = () => {
    if (!editing.name.trim()) return;
    setInterventions(prev => prev.map(i => i.id === editing.id ? editing : i));
    setEditing(null);
    showToast('Intervention updated');
  };
  const del = (id) => {
    if (!confirm('Delete this intervention? Any inputs against it will remain in your data but become orphaned.')) return;
    setInterventions(prev => prev.filter(i => i.id !== id));
    showToast('Intervention deleted');
  };
  const addNew = () => {
    if (!editing.name.trim()) return;
    const maxId = Math.max(0, ...interventions.map(i => i.id));
    setInterventions(prev => [...prev, { ...editing, id: maxId + 1 }]);
    setAdding(false); setEditing(null);
    showToast('Intervention added');
  };
  const resetLibrary = () => {
    if (!confirm('Reset the library back to the original 30 interventions? Any custom interventions will be lost.')) return;
    setInterventions(DEFAULT_INTERVENTIONS);
    showToast('Library reset to defaults');
  };

  const grouped = useMemo(() => {
    const g = { 1: [], 2: [], 3: [], 4: [], 5: [] };
    interventions.forEach(i => { if (g[i.determinant]) g[i.determinant].push(i); });
    return g;
  }, [interventions]);

  return (
    <div className="fade-up pt-10">
      <Eyebrow tone={T.slate}>Library</Eyebrow>
      <div className="flex items-center justify-between flex-wrap gap-3 mb-2">
        <h2 className="serif" style={{ fontSize: 'clamp(30px, 4vw, 44px)', fontWeight: 400, letterSpacing: '-0.02em' }}>Interventions</h2>
        <div className="flex gap-2">
          <button onClick={resetLibrary} style={buttonStyle('secondary')}><RotateCcw size={14} /> Reset to defaults</button>
          <button onClick={() => { setEditing({ name: '', determinant: 1, time: 5, cost: 5, depth: 5, definition: '', examples: '' }); setAdding(true); }} style={buttonStyle('primary')}><Plus size={14} /> Add intervention</button>
        </div>
      </div>
      <p style={{ fontSize: 14, color: T.inkSoft, lineHeight: 1.6, marginBottom: 24, maxWidth: 720 }}>
        The 30 default interventions come from the framework. You can edit definitions, change scores, or add your own intervention types for this rohe or kaupapa. Time, cost, and depth scores (each 1–10) shape the cost–impact frontier in the portfolio view.
      </p>

      <div className="space-y-6">
        {Object.entries(grouped).map(([dId, items]) => {
          const d = DETERMINANTS[dId];
          if (!d) return null;
          return (
            <div key={dId}>
              <div className="flex items-baseline gap-3 mb-3">
                <div style={{ width: 10, height: 10, borderRadius: '50%', background: d.color, marginBottom: 2 }} />
                <h3 className="serif" style={{ fontSize: 18, fontWeight: 500 }}>{d.name}</h3>
                <span style={{ fontSize: 12, color: T.muted, fontStyle: 'italic' }}>{d.subtitle}</span>
              </div>
              <div style={{ background: T.boneLight, border: `1px solid ${T.hairSoft}`, borderRadius: 10, overflow: 'hidden' }}>
                {items.map((it, idx) => (
                  <div key={it.id} className="flex items-start gap-3 p-4" style={{ borderBottom: idx < items.length - 1 ? `1px solid ${T.hairSoft}` : 'none' }}>
                    <span style={{ width: 26, height: 26, borderRadius: 5, background: d.tint, color: d.color, fontSize: 11, fontWeight: 600, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 1 }}>{it.id}</span>
                    <div className="flex-1" style={{ minWidth: 0 }}>
                      <div style={{ fontSize: 14, fontWeight: 500 }}>{it.name}</div>
                      <div style={{ fontSize: 12.5, color: T.inkSoft, marginTop: 4, lineHeight: 1.55 }}>{it.definition}</div>
                    </div>
                    <div className="flex items-center gap-3" style={{ flexShrink: 0 }}>
                      <span style={{ fontSize: 11, color: T.muted, fontFamily: 'ui-monospace, monospace' }} title="Time to impact · Cost intensity · Depth of change">
                        T·{it.time} C·{it.cost} D·{it.depth}
                      </span>
                      <button onClick={() => startEdit(it)} style={buttonStyle('ghost', 'sm')}><Edit3 size={13} /></button>
                      <button onClick={() => del(it.id)} style={{ ...buttonStyle('ghost', 'sm'), color: T.clayDark }}><Trash2 size={13} /></button>
                    </div>
                  </div>
                ))}
                {items.length === 0 && (
                  <div style={{ padding: 18, fontSize: 13, color: T.muted, fontStyle: 'italic' }}>No interventions in this determinant.</div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {editing && (
        <InterventionDialog title={adding ? 'Add intervention' : 'Edit intervention'} value={editing} setValue={setEditing}
          onSave={adding ? addNew : saveEdit} onClose={() => { setEditing(null); setAdding(false); }} />
      )}
    </div>
  );
}

function InterventionDialog({ title, value, setValue, onSave, onClose }) {
  const set = (k, v) => setValue({ ...value, [k]: v });
  return (
    <div className="fixed inset-0 fade-in" style={{ background: 'rgba(30, 38, 32, 0.45)', zIndex: 50 }} onClick={onClose}>
      <div className="max-w-xl mx-auto mt-16 fade-up scroll-soft" style={{ background: T.bone, borderRadius: 12, maxHeight: '85vh', overflowY: 'auto' }} onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between p-6 pb-3">
          <h3 className="serif" style={{ fontSize: 22, fontWeight: 500 }}>{title}</h3>
          <button onClick={onClose} style={{ color: T.muted }}><X size={20} /></button>
        </div>
        <div className="px-6 pb-6 space-y-4">
          <Field label="Name">
            <input value={value.name} onChange={e => set('name', e.target.value)} style={inputStyle()} />
          </Field>
          <Field label="Determinant">
            <select value={value.determinant} onChange={e => set('determinant', Number(e.target.value))} style={inputStyle({ cursor: 'pointer', paddingRight: 30 })}>
              {Object.entries(DETERMINANTS).map(([id, d]) => <option key={id} value={id}>{d.name}</option>)}
            </select>
          </Field>
          <div className="grid grid-cols-3 gap-3">
            <Field label="Time to impact" sub="1 (immediate) – 10 (long)">
              <input type="number" min="1" max="10" value={value.time} onChange={e => set('time', Number(e.target.value))} style={inputStyle()} />
            </Field>
            <Field label="Cost intensity" sub="1 (cheap) – 10 (high)">
              <input type="number" min="1" max="10" value={value.cost} onChange={e => set('cost', Number(e.target.value))} style={inputStyle()} />
            </Field>
            <Field label="Depth of change" sub="1 (shallow) – 10 (deep)">
              <input type="number" min="1" max="10" value={value.depth} onChange={e => set('depth', Number(e.target.value))} style={inputStyle()} />
            </Field>
          </div>
          <Field label="Practical definition" sub="What counts here?">
            <textarea value={value.definition} onChange={e => set('definition', e.target.value)} rows={3} style={{ ...inputStyle(), resize: 'vertical' }} />
          </Field>
          <Field label="Examples & boundaries" sub="What to include and exclude">
            <textarea value={value.examples} onChange={e => set('examples', e.target.value)} rows={3} style={{ ...inputStyle(), resize: 'vertical' }} />
          </Field>
          <div className="flex justify-end gap-2 pt-2">
            <button onClick={onClose} style={buttonStyle('secondary')}>Cancel</button>
            <button onClick={onSave} style={buttonStyle('primary')}><Check size={14} /> Save</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// ABOUT
// ============================================================================
function About() {
  return (
    <div className="fade-up pt-10 max-w-3xl">
      <Eyebrow tone={T.muted}>About</Eyebrow>
      <h2 className="serif" style={{ fontSize: 'clamp(30px, 4vw, 44px)', fontWeight: 400, letterSpacing: '-0.02em', marginBottom: 24 }}>How to use these tools</h2>
      <div className="space-y-8">
        <Block title="What these tools are for">
          <p>These two tools support <em>shared sense-making</em>. The Ecosystem Mapping tool helps you see patterns of effort across a defined ecosystem — a rohe, a kaupapa, a cohort, a funding environment. The Portfolio Balance tool helps you see the shape of your own spend across intervention types.</p>
          <p>The value sits less in the data than in the conversation it provokes. Used together, the two views — what is happening around us, and what we are funding — open up the question of where your contribution is most meaningful.</p>
        </Block>
        <Block title="What they are not">
          <p>These are not evaluations. They do not rank organisations, prescribe action, or determine what should be funded. Reach and efficacy in the Ecosystem tool are <em>subjective judgements</em>, based on lived knowledge — not formal data. Disagreement is expected, and useful.</p>
        </Block>
        <Block title="The 30 interventions">
          <p>The framework groups intervention types under five determinants — Human Potential, Systemic, Physical, Behavioural, and Symptomatic. Each intervention has a practical definition and boundary guidance, and three pre-set scores: time to impact, cost intensity, and depth of change. These scores drive the cost–impact frontier in the portfolio view.</p>
          <p>You can edit, add, or delete interventions in the <strong>Interventions</strong> tab. If you adjust the scores, the portfolio frontier will redraw.</p>
        </Block>
        <Block title="How your work is saved">
          <p>This tool runs entirely in your browser. Your assessment is saved automatically on your device, and you can also generate a shareable link that encodes the whole assessment in the URL — useful for sending to a colleague or coming back to it later. Save and Share is in the top-right.</p>
        </Block>
        <Block title="A note on intent">
          <p className="serif-italic" style={{ fontSize: 17, color: T.inkSoft }}>
            The role of these tools is to make patterns visible so that decisions can be made more deliberately, transparently, and collectively. Used well, they shift the conversation from &ldquo;what is needed?&rdquo; to &ldquo;where is our contribution most meaningful?&rdquo;
          </p>
        </Block>
      </div>
    </div>
  );
}

function Block({ title, children }) {
  return (
    <div>
      <h3 className="serif" style={{ fontSize: 22, fontWeight: 500, marginBottom: 10 }}>{title}</h3>
      <div style={{ fontSize: 15, color: T.inkSoft, lineHeight: 1.7 }} className="space-y-3">{children}</div>
    </div>
  );
}

root.render(<App />);

setTimeout(() => {
  const loader = document.getElementById('loader');
  if (loader) {
    loader.classList.add('gone');
    setTimeout(() => loader.remove(), 500);
  }
}, 200);
</script>
